<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Blattwerk – Worksheet Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
@font-face {
  font-family: 'Grundschrift';
  src: url('fonts/Grundschrift-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'Grundschrift';
  src: url('fonts/Grundschrift-Bold.otf') format('opentype');
  font-weight: 700;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0eee8;--sb:#1e1e2e;--sbt:#cdd6f4;--acc:#f38ba8;--acc2:#a6e3a1;--acc3:#89b4fa;--acc4:#fab387;--tb:#181825;}
body{font-family:'Nunito',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1e1e2e;}
/* Toolbar */
#toolbar{background:var(--tb);color:var(--sbt);display:flex;align-items:center;gap:10px;padding:9px 16px;flex-shrink:0;border-bottom:2px solid #313244;}
.logo{font-size:16px;font-weight:800;color:var(--acc);letter-spacing:-.5px;margin-right:8px;}.logo span{color:var(--acc3);}
.tbtn{background:#313244;border:none;color:var(--sbt);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s;}
.tbtn:hover{background:#45475a;}.tbtn.p{background:var(--acc);color:#1e1e2e;}.tbtn.p:hover{background:#eb6f92;}
.spacer{flex:1;}
/* Layout */
#layout{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
#sidebar{width:220px;background:var(--sb);color:var(--sbt);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;border-right:2px solid #313244;}
#sidebar::-webkit-scrollbar{width:4px;}#sidebar::-webkit-scrollbar-thumb{background:#45475a;border-radius:4px;}
.sb-search{padding:10px 12px 6px;position:sticky;top:0;background:var(--sb);z-index:2;}
.sb-search input{width:100%;background:#313244;border:none;border-radius:5px;padding:6px 9px;color:var(--sbt);font-family:inherit;font-size:12px;outline:none;}
.sb-search input::placeholder{color:#6c7086;}
/* Category tabs */
.cat-tabs{display:flex;gap:0;border-bottom:2px solid #313244;flex-shrink:0;}
.cat-tab{flex:1;background:transparent;border:none;color:#6c7086;padding:7px 4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:color .15s,background .15s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.cat-tab:hover{color:var(--sbt);background:#252535;}
.cat-tab.active{color:var(--sbt);border-bottom-color:var(--cat-color,#89b4fa);}
/* Widget buttons */
.wcat{padding:8px 10px 4px;}
.catlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#6c7086;margin-bottom:5px;}
.wbtn{display:flex;align-items:center;gap:7px;width:100%;background:#313244;border:none;border-radius:6px;color:var(--sbt);padding:6px 9px;margin-bottom:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;text-align:left;transition:background .12s,transform .1s;}
.wbtn:hover{background:#45475a;transform:translateX(2px);}
.wi{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.wd{font-size:10px;color:#6c7086;font-weight:400;display:block;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;}
/* Canvas */
#canvas-area{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;align-items:center;background:var(--bg);}
#canvas-area::-webkit-scrollbar{width:6px;}#canvas-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
#page{width:640px;min-height:810px;background:#fff;border-radius:4px;box-shadow:0 4px 22px rgba(0,0,0,.12);padding:38px 46px;border-top:5px solid var(--acc3);}
#hint{border:2.5px dashed #d0cec8;border-radius:9px;padding:28px;text-align:center;color:#bbb;font-size:14px;font-weight:600;margin-top:10px;}
/* Widgets on canvas */
.wwrap{position:relative;margin-bottom:14px;border-radius:7px;border:2px solid transparent;transition:border-color .15s;}
.wwrap:hover{border-color:var(--acc3);}.wwrap.sel{border-color:var(--acc3);}
.wacts{display:none;position:absolute;top:-13px;right:3px;gap:3px;z-index:10;}
.wwrap:hover .wacts,.wwrap.sel .wacts{display:flex;}
.wa{background:var(--acc3);border:none;border-radius:3px;color:#1e1e2e;font-size:10px;font-weight:700;padding:2px 6px;cursor:pointer;font-family:inherit;}
.wa.del{background:var(--acc);}
.dh{display:none;position:absolute;left:-20px;top:50%;transform:translateY(-50%);cursor:grab;color:#bbb;font-size:15px;user-select:none;}
.wwrap:hover .dh{display:block;}
.winner{padding:7px 9px;}
/* widget internals */
.gmbtn{font-size:10px;background:#e8e6e0;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;color:#555;}
.ws-cell{width:22px;height:22px;background:#f5f3ef;border:1px solid #e0ddd6;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Grundschrift',sans-serif;font-size:11px;font-weight:500;color:#333;}
/* Props panel */
#props{width:200px;background:#f7f5f0;border-left:2px solid #e0ddd6;padding:14px;overflow-y:auto;flex-shrink:0;font-size:12px;}
#props h3{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px;}
.prow{margin-bottom:9px;}
.prow label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:2px;}
.prow input,.prow select,.prow textarea{width:100%;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;outline:none;background:#fff;font-family:inherit;}
.prow input:focus,.prow select:focus,.prow textarea:focus{border-color:var(--acc3);}
/* misc */
*{user-select:none;}input,textarea{user-select:text;}
@media print{
  #toolbar,#sidebar,#props,.wacts,.dh,.gmbtn{display:none!important;}
  #canvas-area{padding:0;background:#fff;}
  #page{box-shadow:none;border-top:none;width:100%;}
  body{background:#fff;height:auto;}
  .wwrap{border:none!important;margin-bottom:12px;}
}
</style>
</head>
<body>
<div id="toolbar">
  <div class="logo">Blatt<span>werk</span></div>
  <button class="tbtn" onclick="addSample()">📄 Beispiel</button>
  <button class="tbtn" onclick="clearCanvas()">🗑 Leeren</button>
  <div class="spacer"></div>
  <span id="wcount" style="color:#6c7086;font-size:11px;">0 Widgets</span>
  <button class="tbtn p" onclick="window.print()">⬇ PDF / Drucken</button>
</div>
<div id="layout">
  <div id="sidebar">
    <div class="sb-search">
      <input type="text" id="search" placeholder="🔍 Widget suchen…" oninput="filterW(this.value)">
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="wlist"></div>
  </div>
  <div id="canvas-area" onclick="desel()">
    <div id="page">
      <div id="wc"></div>
      <div id="hint">← Widget aus der Liste wählen und einfügen</div>
    </div>
  </div>
  <div id="props">
    <h3>Eigenschaften</h3>
    <div id="pi" style="color:#bbb;text-align:center;margin-top:20px;font-size:12px;">Widget auswählen</div>
  </div>
</div>

<script>
// ── WIDGET DEFINITIONS ────────────────────────────────────────────
// (In a real module setup these would be imported; here inlined for single-file portability)

const CATEGORIES = {
  allgemein:  { label: "Allgemein",  color: "#89b4fa" },
  deutsch:    { label: "Deutsch",    color: "#f38ba8" },
  mathematik: { label: "Mathematik", color: "#a6e3a1" },
};

// ── Helper shared by all widgets ──────────────────────────────────
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const pr  = (l,inp) => `<div class="prow"><label>${l}</label>${inp}</div>`;

// ── WIDGET MAP ────────────────────────────────────────────────────
// Each entry: { meta, createData, render, renderProps }
const WIDGETS = [

  // ── ALLGEMEIN ───────────────────────────────────────────────────
  {
    meta: { type:"heading", label:"Überschrift", desc:"Großer Titel", icon:"H1", category:"allgemein" },
    createData: id => ({ id, type:"heading", text:"Überschrift" }),
    render: d => `<input value="${esc(d.text)}" style="border:none;outline:none;font-weight:800;font-size:22px;width:100%;background:transparent;font-family:inherit;" onclick="event.stopPropagation()" onchange="upd(${d.id},'text',this.value)">`,
    renderProps: d => pr("Text", `<input value="${esc(d.text)}" onchange="upd(${d.id},'text',this.value)">`),
  },
  {
    meta: { type:"subheading", label:"Zwischentitel", desc:"Abschnittstitel", icon:"H2", category:"allgemein" },
    createData: id => ({ id, type:"subheading", text:"Aufgabe 1" }),
    render: d => `<input value="${esc(d.text)}" style="border:none;outline:none;font-weight:700;font-size:15px;width:100%;color:#555;background:transparent;font-family:inherit;" onclick="event.stopPropagation()" onchange="upd(${d.id},'text',this.value)">`,
    renderProps: d => pr("Text", `<input value="${esc(d.text)}" onchange="upd(${d.id},'text',this.value)">`),
  },
  {
    meta: { type:"instruction", label:"Aufgabentext", desc:"Aufgabenstellung", icon:"📋", category:"allgemein" },
    createData: id => ({ id, type:"instruction", text:"Lies den Text und beantworte die Fragen." }),
    render: d => `<div style="background:#f8f6f2;border-left:4px solid #fab387;padding:7px 11px;border-radius:0 5px 5px 0;"><textarea style="border:none;outline:none;font-size:13px;width:100%;background:transparent;resize:none;min-height:34px;font-family:inherit;color:#555;" onclick="event.stopPropagation()" onchange="upd(${d.id},'text',this.value)">${esc(d.text)}</textarea></div>`,
    renderProps: d => pr("Text", `<input value="${esc(d.text)}" onchange="upd(${d.id},'text',this.value)">`),
  },
  {
    meta: { type:"namedate", label:"Name / Datum", desc:"Kopfzeile", icon:"✏️", category:"allgemein" },
    createData: id => ({ id, type:"namedate" }),
    render: d => `<div style="display:flex;gap:16px;font-size:13px;"><div style="display:flex;align-items:flex-end;gap:5px;flex:1;"><strong>Name:</strong><div style="flex:1;border-bottom:1.5px solid #999;height:20px;"></div></div><div style="display:flex;align-items:flex-end;gap:5px;flex:1;"><strong>Datum:</strong><div style="flex:1;border-bottom:1.5px solid #999;height:20px;"></div></div></div>`,
    renderProps: d => '<span style="color:#bbb;font-size:11px;">Keine Optionen</span>',
  },
  {
    meta: { type:"divider", label:"Trennlinie", desc:"Abschnitt trennen", icon:"—", category:"allgemein" },
    createData: id => ({ id, type:"divider" }),
    render: d => `<hr style="border:none;border-top:2px solid #e0ddd6;margin:6px 0;">`,
    renderProps: d => '<span style="color:#bbb;font-size:11px;">Keine Optionen</span>',
  },
  {
    meta: { type:"linebox", label:"Schreiblinien", desc:"Antwortzeilen", icon:"≡", category:"allgemein" },
    createData: id => ({ id, type:"linebox", lines:3, label:"" }),
    render: d => Array.from({length:d.lines},(_,i)=>`${(d.label&&i===0)?`<div style="font-size:11px;color:#888;font-weight:700;margin-bottom:-2px;">${esc(d.label)}</div>`:""}<div style="border-bottom:1.5px solid #999;height:26px;margin-bottom:6px;"></div>`).join(""),
    renderProps: d => pr("Anzahl Zeilen",`<input type="number" min="1" max="10" value="${d.lines}" onchange="upd(${d.id},'lines',+this.value)">`)+pr("Beschriftung",`<input value="${esc(d.label)}" placeholder="z.B. Antwort:" onchange="upd(${d.id},'label',this.value)">`),
  },
  {
    meta: { type:"checkbox", label:"Checkliste", desc:"Ankreuzaufgabe", icon:"☑", category:"allgemein" },
    createData: id => ({ id, type:"checkbox", items:["Richtig","Falsch","Vielleicht"] }),
    render: d => d.items.map(it=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:14px;"><div style="width:15px;height:15px;border:2px solid #999;border-radius:2px;flex-shrink:0;"></div>${esc(it)}</div>`).join(""),
    renderProps: d => pr("Einträge (eine Zeile pro Eintrag)",`<textarea style="width:100%;font-family:inherit;font-size:12px;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;min-height:70px;resize:vertical;" onchange="upd(${d.id},'items',this.value.split('\\n').filter(s=>s.trim()))">${d.items.join("\n")}</textarea>`),
  },
  {
    meta: { type:"image", label:"Bild", desc:"Bildplatzhalter", icon:"🖼", category:"allgemein" },
    createData: id => ({ id, type:"image", caption:"Bild", height:120 }),
    render: d => `<div style="border:2.5px dashed #ccc;border-radius:8px;height:${d.height}px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;font-size:13px;font-weight:600;background:#fafaf8;gap:6px;"><span style="font-size:28px;">🖼</span><span>${esc(d.caption)}</span></div>`,
    renderProps: d => pr("Beschriftung",`<input value="${esc(d.caption)}" onchange="upd(${d.id},'caption',this.value)">`)+pr("Höhe (px)",`<input type="number" min="60" max="400" step="10" value="${d.height}" onchange="upd(${d.id},'height',+this.value)">`),
  },
  {
    meta: { type:"table", label:"Tabelle", desc:"Zeilen & Spalten", icon:"⊞", category:"allgemein" },
    createData: id => ({ id, type:"table", rows:3, cols:3, hasHeader:true }),
    render: d => {
      let html=`<table style="border-collapse:collapse;width:100%;">`;
      for(let r=0;r<d.rows;r++){html+="<tr>";for(let c=0;c<d.cols;c++){const hdr=d.hasHeader&&r===0;html+=`<td style="border:1px solid #ddd;padding:7px 10px;min-width:55px;font-size:13px;${hdr?"font-weight:700;background:#f5f3ef;":""}">&nbsp;</td>`;}html+="</tr>";}
      return html+"</table>";
    },
    renderProps: d => pr("Zeilen",`<input type="number" min="1" max="12" value="${d.rows}" onchange="upd(${d.id},'rows',+this.value)">`)+pr("Spalten",`<input type="number" min="1" max="8" value="${d.cols}" onchange="upd(${d.id},'cols',+this.value)">`)+pr("Kopfzeile",`<select onchange="upd(${d.id},'hasHeader',this.value==='true')"><option value="true" ${d.hasHeader?"selected":""}>Ja</option><option value="false" ${!d.hasHeader?"selected":""}>Nein</option></select>`),
  },

  // ── DEUTSCH ─────────────────────────────────────────────────────
  {
    meta: { type:"gap_text", label:"Lückentext", desc:"___ zum Ausfüllen", icon:"___", category:"deutsch" },
    createData: id => ({ id, type:"gap_text", text:"Der Elefant heißt ___. Er ist ___ und ___.", mode:"preview" }),
    render: d => {
      if(d.mode==="edit") return `<textarea style="border:1px solid #ddd;border-radius:5px;padding:6px;font-size:14px;width:100%;resize:none;min-height:60px;font-family:inherit;line-height:1.7;" onclick="event.stopPropagation()" onchange="upd(${d.id},'text',this.value)">${esc(d.text)}</textarea><button class="gmbtn" onclick="event.stopPropagation();tgap(${d.id})">👁 Vorschau</button>`;
      return `<div style="font-size:14px;line-height:2.2;">${d.text.replace(/___/g,'<span style="display:inline-block;border-bottom:2px solid #333;min-width:55px;margin:0 2px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>')}</div><button class="gmbtn" onclick="event.stopPropagation();tgap(${d.id})">✏️ Bearbeiten</button>`;
    },
    renderProps: d => pr("Text (___&nbsp;=&nbsp;Lücke)",`<input value="${esc(d.text)}" onchange="upd(${d.id},'text',this.value)">`),
  },
  {
    meta: { type:"wordsearch", label:"Suchsel", desc:"Buchstabengitter", icon:"🔠", category:"deutsch" },
    createData: id => ({ id, type:"wordsearch", words:"ELMAR,ELEFANT,BUNT,FREUND", size:10 }),
    render: d => {
      const words=d.words.split(",").map(w=>w.trim().toUpperCase()).filter(Boolean);
      const S=Math.max(d.size||10,words.reduce((m,w)=>Math.max(m,w.length),5));
      const grid=Array.from({length:S},()=>Array(S).fill(""));
      const dirs=[[0,1],[1,0],[1,1],[0,-1],[-1,0]];
      words.forEach(word=>{
        for(let a=0;a<100;a++){
          const[dr,dc]=dirs[Math.floor(Math.random()*dirs.length)];
          const maxR=dr>0?S-word.length:dr<0?word.length-1:S-1;
          const maxC=dc>0?S-word.length:dc<0?word.length-1:S-1;
          if(maxR<0||maxC<0)continue;
          const r=Math.floor(Math.random()*(maxR+1));
          const c=Math.floor(Math.random()*(maxC+1));
          let ok=true;for(let i=0;i<word.length;i++){const ch=grid[r+dr*i][c+dc*i];if(ch&&ch!==word[i]){ok=false;break;}}
          if(ok){for(let i=0;i<word.length;i++)grid[r+dr*i][c+dc*i]=word[i];break;}
        }
      });
      const L="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(!grid[r][c])grid[r][c]=L[Math.floor(Math.random()*26)];
      const cells=grid.map(row=>row.map(ch=>`<div class="ws-cell">${ch}</div>`).join("")).join("");
      const wl=words.map(w=>`<span style="font-family:monospace;font-size:12px;background:#f0eee8;padding:2px 6px;border-radius:3px;margin:2px;display:inline-block;">${w}</span>`).join("");
      return `<div><div style="font-size:11px;color:#888;font-weight:700;margin-bottom:5px;">Finde die Wörter:</div><div style="margin-bottom:7px;">${wl}</div><div style="display:inline-grid;grid-template-columns:repeat(${S},22px);gap:2px;">${cells}</div></div>`;
    },
    renderProps: d => pr("Wörter (kommagetrennt)",`<input value="${esc(d.words)}" onchange="updrg(${d.id},'words',this.value)">`)+pr("Gittergröße",`<input type="number" min="6" max="15" value="${d.size||10}" onchange="updrg(${d.id},'size',+this.value)">`),
  },
  {
    meta: { type:"scramble", label:"Buchstabensalat", desc:"Wörter entwirren", icon:"🔀", category:"deutsch" },
    createData: id => ({ id, type:"scramble", words:"SCHULE,KLASSE,LEHRER" }),
    render: d => {
      const items=d.words.split(",").map(w=>{const u=w.trim().toUpperCase();const s=u.split("").sort(()=>Math.random()-.5).join("");return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:13px;"><span style="font-family:monospace;font-size:14px;background:#f0eee8;padding:3px 8px;border-radius:4px;letter-spacing:2px;">${s}</span><span style="color:#bbb;">→</span><div style="border-bottom:1.5px solid #999;flex:1;height:20px;"></div></div>`;}).join("");
      return `<div>${items}</div>`;
    },
    renderProps: d => pr("Wörter (kommagetrennt)",`<input value="${esc(d.words)}" onchange="upd(${d.id},'words',this.value)">`),
  },
  {
    meta: { type:"matching", label:"Zuordnung", desc:"Paare verbinden", icon:"↔", category:"deutsch" },
    createData: id => ({ id, type:"matching", pairs:[["Hund","bellt"],["Katze","miaut"],["Kuh","muht"]] }),
    render: d => `<table style="border-collapse:collapse;">${d.pairs.map(([a,b])=>`<tr><td style="padding:4px 10px;font-size:13px;border:1px solid #eee;">${esc(a)}</td><td style="padding:4px 10px;color:#ccc;letter-spacing:3px;">·····</td><td style="padding:4px 10px;font-size:13px;border:1px solid #eee;">${esc(b)}</td></tr>`).join("")}</table>`,
    renderProps: d => pr("Paare (Format: links=rechts)",`<textarea style="width:100%;font-family:monospace;font-size:11px;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;min-height:80px;resize:vertical;" onchange="upd(${d.id},'pairs',this.value.split('\\n').filter(l=>l.includes('=')).map(l=>{const[a,...b]=l.split('=');return[a.trim(),b.join('=').trim()];}))">${d.pairs.map(([a,b])=>`${a}=${b}`).join("\n")}</textarea>`),
  },
  {
    meta: { type:"numbering", label:"Nummerierung", desc:"Geordnete Liste", icon:"1.", category:"deutsch" },
    createData: id => ({ id, type:"numbering", items:["Erstens","Zweitens","Drittens"] }),
    render: d => d.items.map((it,i)=>`<div style="font-size:14px;padding:3px 0;"><strong>${i+1}.</strong> ${esc(it)}</div>`).join(""),
    renderProps: d => pr("Einträge (eine Zeile pro Eintrag)",`<textarea style="width:100%;font-family:inherit;font-size:12px;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;min-height:70px;resize:vertical;" onchange="upd(${d.id},'items',this.value.split('\\n').filter(s=>s.trim()))">${d.items.join("\n")}</textarea>`),
  },

  // ── MATHEMATIK ──────────────────────────────────────────────────
  {
    meta: { type:"arithmetic", label:"Rechenaufgaben", desc:"Plus, Minus, Mal, Geteilt", icon:"➕", category:"mathematik" },
    createData: id => ({ id, type:"arithmetic", tasks:"3 + 4 =\n7 - 2 =\n5 × 3 =\n12 ÷ 4 =", cols:2 }),
    render: d => {
      const tasks=d.tasks.split("\n").map(t=>t.trim()).filter(Boolean);
      const cols=d.cols||2;
      let html=`<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px 20px;">`;
      tasks.forEach(task=>{
        const display=task.endsWith("=")?`${esc(task)} <span style="display:inline-block;border-bottom:2px solid #333;min-width:40px;">&nbsp;</span>`:esc(task);
        html+=`<div style="font-size:16px;font-family:'Grundschrift',sans-serif;padding:4px 0;">${display}</div>`;
      });
      return html+"</div>";
    },
    renderProps: d => pr("Aufgaben (eine pro Zeile, = am Ende → Lücke)",`<textarea style="width:100%;font-family:monospace;font-size:12px;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;min-height:90px;resize:vertical;" onchange="upd(${d.id},'tasks',this.value)">${esc(d.tasks)}</textarea>`)+pr("Spalten",`<input type="number" min="1" max="4" value="${d.cols}" onchange="upd(${d.id},'cols',+this.value)">`),
  },
  {
    meta: { type:"numberline", label:"Zahlenstrahl", desc:"Lücken eintragen", icon:"↔", category:"mathematik" },
    createData: id => ({ id, type:"numberline", start:0, end:50, step:10, gaps:"20,40" }),
    render: d => {
      const start=+d.start, end=+d.end, step=+d.step;
      const gaps=new Set((d.gaps||"").split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n)));

      // Half-step marking for steps 10, 100, 1000
      const halfStep = (step===10||step===100||step===1000) ? step/2 : null;

      // Collect all main points
      const points=[];
      for(let i=start;i<=end;i+=step) points.push(i);

      const cellW = step===1 ? 34 : 46;  // wider spacing for larger steps
      const totalW = points.length * cellW;
      const svgW = Math.min(totalW + 30, 540);
      const viewW = totalW + 30;

      // Scale: map value to x position
      const range = end - start;
      const scale = v => 10 + ((v - start) / range) * totalW;

      let ticks="", labels="";

      // Draw half-step ticks between main points (shorter tick, no label)
      if (halfStep !== null) {
        for (let i = start; i < end; i += step) {
          const mid = i + halfStep;
          const x = scale(mid);
          ticks += `<line x1="${x}" y1="22" x2="${x}" y2="28" stroke="#999" stroke-width="1"/>`;
        }
      }

      // Draw main ticks and labels/gaps
      points.forEach((val, idx) => {
        const x = scale(val);
        const isGap = gaps.has(val);
        // Main tick: taller
        ticks += `<line x1="${x}" y1="18" x2="${x}" y2="32" stroke="#444" stroke-width="1.5"/>`;
        if (isGap) {
          const boxW = step >= 100 ? 38 : step >= 10 ? 30 : 24;
          labels += `<rect x="${x - boxW/2}" y="34" width="${boxW}" height="18" rx="2" fill="white" stroke="#555" stroke-width="1.5"/>`;
        } else {
          const fontSize = step >= 1000 ? 10 : step >= 100 ? 11 : 12;
          labels += `<text x="${x}" y="48" text-anchor="middle" font-family="'Grundschrift',sans-serif" font-size="${fontSize}" fill="#333">${val}</text>`;
        }
      });

      // Arrow tip
      const arrowX = 10 + totalW;
      return `<svg width="${svgW}" height="60" viewBox="0 0 ${viewW} 60" style="max-width:100%;">
        <line x1="10" y1="25" x2="${arrowX}" y2="25" stroke="#333" stroke-width="2"/>
        <polygon points="${arrowX+6},25 ${arrowX},22 ${arrowX},28" fill="#333"/>
        ${ticks}${labels}
      </svg>`;
    },
    renderProps: d => {
      const stepSel = `<select onchange="upd(${d.id},'step',+this.value)">
        <option value="1"    ${+d.step===1   ?"selected":""}>1</option>
        <option value="10"   ${+d.step===10  ?"selected":""}>10</option>
        <option value="100"  ${+d.step===100 ?"selected":""}>100</option>
        <option value="1000" ${+d.step===1000?"selected":""}>1000</option>
      </select>`;
      return pr("Start", `<input type="number" value="${d.start}" onchange="upd(${d.id},'start',+this.value)">`) +
        pr("Ende",  `<input type="number" value="${d.end}"   onchange="upd(${d.id},'end',+this.value)">`) +
        pr("Schritt", stepSel) +
        pr("Lücken (kommagetrennte Zahlen)", `<input value="${esc(d.gaps)}" placeholder="z.B. 20,40" onchange="upd(${d.id},'gaps',this.value)">`);
    },
  },
  {
    meta: { type:"geometry", label:"Geometrie", desc:"Formen & Maße", icon:"◻", category:"mathematik" },
    createData: id => ({ id, type:"geometry", shape:"rectangle", label:"Berechne den Flächeninhalt.", a:6, b:4 }),
    render: d => {
      const {shape,a,b,label}=d;let svg="";
      if(shape==="rectangle"){const w=Math.min(a*18,160),h=Math.min(b*18,110);svg=`<svg width="${w+60}" height="${h+40}" style="overflow:visible;"><rect x="30" y="10" width="${w}" height="${h}" fill="#e8f4fd" stroke="#89b4fa" stroke-width="2" rx="2"/><text x="${30+w/2}" y="${h+28}" text-anchor="middle" font-size="12" fill="#555">${a} cm</text><text x="14" y="${10+h/2}" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,14,${10+h/2})">${b} cm</text></svg>`;}
      else if(shape==="triangle"){const bw=Math.min(a*20,160),h2=Math.min(b*16,100),cx=30+bw/2;svg=`<svg width="${bw+60}" height="${h2+40}" style="overflow:visible;"><polygon points="${cx},10 ${30},${10+h2} ${30+bw},${10+h2}" fill="#fef3e2" stroke="#fab387" stroke-width="2"/><text x="${cx}" y="${10+h2+22}" text-anchor="middle" font-size="12" fill="#555">${a} cm</text><text x="${30+bw+8}" y="${10+h2/2}" font-size="12" fill="#555">${b} cm</text></svg>`;}
      else if(shape==="circle"){const r=Math.min(a*9,70);svg=`<svg width="${r*2+40}" height="${r*2+30}" style="overflow:visible;"><circle cx="${r+20}" cy="${r+10}" r="${r}" fill="#f0fdf4" stroke="#a6e3a1" stroke-width="2"/><line x1="${r+20}" y1="${r+10}" x2="${r*2+20}" y2="${r+10}" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/><text x="${r+20+r/2}" y="${r+6}" text-anchor="middle" font-size="12" fill="#555">r = ${a} cm</text></svg>`;}
      return `<div>${label?`<div style="font-size:13px;color:#555;margin-bottom:10px;">${esc(label)}</div>`:""}<div style="margin:8px 0;">${svg}</div><div style="display:flex;gap:5px;align-items:center;font-size:13px;margin-top:8px;"><span>Flächeninhalt:</span><div style="border-bottom:1.5px solid #999;flex:1;height:20px;max-width:120px;"></div><span>cm²</span></div></div>`;
    },
    renderProps: d => pr("Form",`<select onchange="upd(${d.id},'shape',this.value)"><option value="rectangle" ${d.shape==="rectangle"?"selected":""}>Rechteck</option><option value="triangle" ${d.shape==="triangle"?"selected":""}>Dreieck</option><option value="circle" ${d.shape==="circle"?"selected":""}>Kreis</option></select>`)+pr(d.shape==="circle"?"Radius (cm)":"Seite a (cm)",`<input type="number" min="1" max="15" value="${d.a}" onchange="upd(${d.id},'a',+this.value)">`)+( d.shape!=="circle"?pr("Seite b (cm)",`<input type="number" min="1" max="15" value="${d.b}" onchange="upd(${d.id},'b',+this.value)">`):"")+pr("Aufgabentext",`<input value="${esc(d.label)}" onchange="upd(${d.id},'label',this.value)">`),
  },

  // ── ZAHLENMAUER ─────────────────────────────────────────────────
  {
    meta: { type:"zahlenmauer", label:"Zahlenmauer", desc:"Steine addieren", icon:"🧱", category:"mathematik" },

    createData: id => {
      const base = [3,5,2,4];
      return { id, type:"zahlenmauer", rows_count:4, base, fillMode:"basis" };
    },

    render: d => {
      const n = d.rows_count || 4;
      const base = (d.base || []).slice(0, n);
      while (base.length < n) base.push(1);
      const fillMode = d.fillMode || "basis";

      // Build full grid. grid[0] = Basis (unten, n Steine), grid[n-1] = Spitze (oben, 1 Stein)
      const grid = [base.map(v => +v)];
      for (let row = 1; row < n; row++) {
        const prev = grid[row - 1];
        const next = [];
        for (let i = 0; i < prev.length - 1; i++) next.push(prev[i] + prev[i + 1]);
        grid.push(next);
      }

      // Determine which cells are shown. key = "gridRow,col" (gridRow 0=Basis)
      const shown = {};
      if (fillMode === "basis") {
        // All basis stones shown
        for (let c = 0; c < n; c++) shown[`0,${c}`] = true;
      } else {
        // Random: pick cells that together uniquely determine the solution.
        // Uses Gaussian elimination to check rank of the equation system.
        const allCells = [];
        for (let r = 0; r < n; r++)
          for (let c = 0; c < n - r; c++)
            allCells.push([r, c]);

        // Build binomial coefficient row for cell (gridRow, col)
        function cellCoeffs(gridRow, col) {
          const coeffs = new Array(n).fill(0);
          for (let k = 0; k <= gridRow; k++) {
            // C(gridRow, k)
            let binom = 1;
            for (let i = 0; i < k; i++) binom = binom * (gridRow - i) / (i + 1);
            coeffs[col + k] += binom;
          }
          return coeffs;
        }

        // Gaussian elimination rank check
        function matRank(cellList) {
          if (!cellList.length) return 0;
          const mat = cellList.map(([r,c]) => cellCoeffs(r, c).map(v => v));
          let rank = 0;
          for (let col = 0; col < n; col++) {
            let pivot = -1;
            for (let row = rank; row < mat.length; row++) {
              if (Math.abs(mat[row][col]) > 1e-9) { pivot = row; break; }
            }
            if (pivot === -1) continue;
            [mat[rank], mat[pivot]] = [mat[pivot], mat[rank]];
            for (let row = 0; row < mat.length; row++) {
              if (row !== rank && Math.abs(mat[row][col]) > 1e-9) {
                const f = mat[row][col] / mat[rank][col];
                for (let j = 0; j < n; j++) mat[row][j] -= f * mat[rank][j];
              }
            }
            rank++;
          }
          return rank;
        }

        // Shuffle and greedily pick cells until system is uniquely determined (rank = n)
        // Target: show roughly n + small random extra cells
        const target = n + Math.floor(Math.random() * (n - 1));
        const shuffled = allCells.slice().sort(() => Math.random() - 0.5);
        const chosen = [];
        for (const cell of shuffled) {
          const candidate = [...chosen, cell];
          // Always add if rank still below n, prefer cells that increase rank
          if (matRank(candidate) > matRank(chosen) || (chosen.length < target && matRank(chosen) === n)) {
            chosen.push(cell);
          }
          if (chosen.length >= target && matRank(chosen) === n) break;
        }
        // Fallback: if still not unique, add remaining cells until rank = n
        if (matRank(chosen) < n) {
          for (const cell of shuffled) {
            if (!chosen.includes(cell)) chosen.push(cell);
            if (matRank(chosen) === n) break;
          }
        }
        for (const [r, c] of chosen) shown[`${r},${c}`] = true;
      }

      // Cell dimensions: wider than tall
      const cw = 54, ch = 38, stroke = 2;
      // Total SVG width = n * cw + stroke, height = n * ch + stroke
      const svgW = n * cw + stroke;
      const svgH = n * ch + stroke;

      let rects = "";
      let texts = "";

      // Draw rows: visually row 0 at TOP = Spitze (1 Stein), visually row n-1 at BOTTOM = Basis (n Steine)
      // grid[0] = Basis (n Steine), grid[n-1] = Spitze (1 Stein)
      // So: visualRow 0 (top) → gridRow n-1 (Spitze, 1 Stein)
      //     visualRow n-1 (bottom) → gridRow 0 (Basis, n Steine)
      for (let visualRow = 0; visualRow < n; visualRow++) {
        const gridRow = n - 1 - visualRow; // gridRow n-1=Spitze oben, gridRow 0=Basis unten
        const stonesInRow = n - gridRow;   // Spitze: n-(n-1)=1, Basis: n-0=n

        // Center this row horizontally
        const rowW = stonesInRow * cw;
        const xStart = (n * cw - rowW) / 2;
        const y = visualRow * ch;

        for (let col = 0; col < stonesInRow; col++) {
          const x = xStart + col * cw;
          const key = `${gridRow},${col}`;
          const isShown = shown[key];
          const val = grid[gridRow][col];
          const fill = isShown ? "#f0ede6" : "#ffffff";

          rects += `<rect x="${x + stroke/2}" y="${y + stroke/2}" width="${cw}" height="${ch}" fill="${fill}" stroke="#444" stroke-width="${stroke}"/>`;
          if (isShown) {
            texts += `<text x="${x + stroke/2 + cw/2}" y="${y + stroke/2 + ch/2 + 5}" text-anchor="middle" font-family="'Grundschrift',sans-serif" font-size="14" font-weight="700" fill="#222">${val}</text>`;
          }
        }
      }

      return `<svg width="${svgW}" height="${svgH}" style="display:block;max-width:100%;" xmlns="http://www.w3.org/2000/svg">${rects}${texts}</svg>`;
    },

    renderProps: d => {
      const n = d.rows_count || 4;
      const base = (d.base || []).slice(0,n);
      while(base.length < n) base.push(1);
      const fillMode = d.fillMode || "basis";

      const basisInputs = base.map((v,col) =>
        `<input type="number" min="1" max="99" value="${v}" style="width:40px;border:1.5px solid #ddd;border-radius:4px;padding:4px;font-size:13px;text-align:center;font-family:'Grundschrift',sans-serif;outline:none;"
          onchange="zmSetBase(${d.id},${col},this.value)">`
      ).join("");

      return pr("Anzahl Basissteine",
          `<select onchange="zmResize(${d.id},+this.value)">
            <option value="2" ${n===2?"selected":""}>2</option>
            <option value="3" ${n===3?"selected":""}>3</option>
            <option value="4" ${n===4?"selected":""}>4</option>
            <option value="5" ${n===5?"selected":""}>5</option>
            <option value="6" ${n===6?"selected":""}>6</option>
          </select>`) +
        pr("Sichtbare Steine",
          `<select onchange="zmFillMode(${d.id},this.value)">
            <option value="basis" ${fillMode==="basis"?"selected":""}>Nur Basissteine</option>
            <option value="random" ${fillMode==="random"?"selected":""}>Zufällig (eindeutig lösbar)</option>
          </select>`) +
        pr("Basissteine (von links)", `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;">${basisInputs}</div>`) +
        `<button onclick="zmRandomBase(${d.id})" style="margin-top:8px;width:100%;background:#e8e6e0;border:none;border-radius:4px;padding:5px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#555;">🎲 Zufällige Basiszahlen</button>`;
    },
  },
];

// Lookup map
const WIDGET_MAP = Object.fromEntries(WIDGETS.map(w=>[w.meta.type,w]));

// ── STATE ─────────────────────────────────────────────────────────
let widgets=[],selId=null,idC=0,dragSrc=null,activeTab="allgemein",searchFilter="";

// ── SIDEBAR ───────────────────────────────────────────────────────
function buildTabs(){
  const tabs=document.getElementById("cat-tabs");
  tabs.innerHTML="";
  Object.entries(CATEGORIES).forEach(([key,cat])=>{
    const btn=document.createElement("button");
    btn.className="cat-tab"+(activeTab===key?" active":"");
    btn.textContent=cat.label;
    btn.style.setProperty("--cat-color",cat.color);
    if(activeTab===key)btn.style.borderBottomColor=cat.color;
    btn.onclick=()=>{activeTab=key;buildTabs();buildList();};
    tabs.appendChild(btn);
  });
}

function buildList(){
  const list=document.getElementById("wlist");list.innerHTML="";
  const f=searchFilter.toLowerCase();
  const toShow=WIDGETS.filter(w=>{
    const matchCat=!f&&w.meta.category===activeTab;
    const matchSearch=f&&(w.meta.label.toLowerCase().includes(f)||w.meta.desc.toLowerCase().includes(f));
    return matchCat||matchSearch;
  });
  if(!toShow.length){list.innerHTML=`<div style="padding:16px 12px;color:#6c7086;font-size:12px;">Keine Widgets gefunden</div>`;return;}
  // When searching, group by category
  if(f){
    const grouped={};
    toShow.forEach(w=>{(grouped[w.meta.category]=grouped[w.meta.category]||[]).push(w);});
    Object.entries(grouped).forEach(([cat,items])=>{
      const sec=document.createElement("div");sec.className="wcat";
      sec.innerHTML=`<div class="catlabel" style="color:${CATEGORIES[cat].color};">${CATEGORIES[cat].label}</div>`;
      items.forEach(w=>sec.appendChild(makeBtn(w,CATEGORIES[w.meta.category].color)));
      list.appendChild(sec);
    });
  } else {
    const sec=document.createElement("div");sec.className="wcat";
    toShow.forEach(w=>sec.appendChild(makeBtn(w,CATEGORIES[w.meta.category].color)));
    list.appendChild(sec);
  }
}

function makeBtn(w,color){
  const btn=document.createElement("button");btn.className="wbtn";
  btn.innerHTML=`<span class="wi">${w.meta.icon}</span><span>${w.meta.label}<span class="wd">${w.meta.desc}</span></span><span class="dot" style="background:${color}"></span>`;
  btn.onclick=()=>addWidget(w.meta.type);
  return btn;
}

function filterW(val){searchFilter=val;buildList();}

// ── CANVAS ────────────────────────────────────────────────────────
function addWidget(type){
  const def=WIDGET_MAP[type];if(!def)return;
  const w=def.createData(++idC);
  widgets.push(w);render();sel(w.id);
}

function render(){
  const c=document.getElementById("wc");
  document.getElementById("hint").style.display=widgets.length?"none":"block";
  c.innerHTML="";
  widgets.forEach((w,idx)=>{
    const def=WIDGET_MAP[w.type];if(!def)return;
    const div=document.createElement("div");
    div.className="wwrap"+(selId===w.id?" sel":"");
    div.draggable=true;div.dataset.idx=idx;
    div.innerHTML=`
      <span class="dh" title="Ziehen zum Sortieren">⠿</span>
      <div class="wacts">
        <button class="wa" onclick="event.stopPropagation();mv(${idx},-1)" title="Nach oben">↑</button>
        <button class="wa" onclick="event.stopPropagation();mv(${idx},1)"  title="Nach unten">↓</button>
        <button class="wa" onclick="event.stopPropagation();dup(${idx})"   title="Duplizieren">⧉</button>
        <button class="wa del" onclick="event.stopPropagation();del(${w.id})" title="Löschen">✕</button>
      </div>
      <div class="winner">${def.render(w)}</div>`;
    div.onclick=e=>{e.stopPropagation();sel(w.id);};
    div.ondragstart=e=>{dragSrc=idx;e.dataTransfer.effectAllowed="move";};
    div.ondragover=e=>{e.preventDefault();div.style.boxShadow="0 -2px 0 #89b4fa";};
    div.ondragleave=()=>{div.style.boxShadow="";};
    div.ondrop=e=>{e.preventDefault();div.style.boxShadow="";const t=+div.dataset.idx;if(dragSrc===null||dragSrc===t)return;const m=widgets.splice(dragSrc,1)[0];widgets.splice(t,0,m);render();};
    c.appendChild(div);
  });
  document.getElementById("wcount").textContent=`${widgets.length} Widget${widgets.length!==1?"s":""}`;
}

function sel(id){selId=id;render();renderProps(id);}
function desel(){selId=null;render();document.getElementById("pi").innerHTML='<span style="color:#bbb;">Widget auswählen</span>';}

function renderProps(id){
  const w=widgets.find(x=>x.id===id);
  const p=document.getElementById("pi");
  if(!w){p.innerHTML='<span style="color:#bbb;">Widget auswählen</span>';return;}
  const def=WIDGET_MAP[w.type];
  p.innerHTML=`<div style="font-weight:800;font-size:13px;margin-bottom:11px;color:#333;">${def?def.meta.label:w.type}</div>${def?def.renderProps(w):""}`;
}

// ── ACTIONS ───────────────────────────────────────────────────────
function upd(id,k,v){const w=widgets.find(x=>x.id===id);if(w){w[k]=v;render();renderProps(id);}}
function updrg(id,k,v){const w=widgets.find(x=>x.id===id);if(w){w[k]=v;render();renderProps(id);}}

// ── ZAHLENMAUER helpers ───────────────────────────────────────────
function zmSetBase(id, col, val) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  const base = (w.base || []).slice();
  base[col] = val !== "" ? +val : 1;
  w.base = base;
  render(); renderProps(id);
}
function zmResize(id, n) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  n = Math.max(2, Math.min(6, n));
  const oldBase = w.base || [];
  // Extend or truncate base
  w.base = Array.from({length:n}, (_,c) => oldBase[c] !== undefined ? oldBase[c] : Math.floor(Math.random()*8)+1);
  w.rows_count = n;
  render(); renderProps(id);
}
function zmFillMode(id, mode) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  w.fillMode = mode;
  render(); renderProps(id);
}
function zmRandomBase(id) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  const n = w.rows_count || 4;
  w.base = Array.from({length:n}, () => Math.floor(Math.random()*9)+1);
  render(); renderProps(id);
}
function tgap(id){const w=widgets.find(x=>x.id===id);if(w){w.mode=w.mode==="edit"?"preview":"edit";render();}}
function del(id){widgets=widgets.filter(x=>x.id!==id);if(selId===id)desel();else render();}
function mv(idx,d){const ni=idx+d;if(ni<0||ni>=widgets.length)return;[widgets[idx],widgets[ni]]=[widgets[ni],widgets[idx]];render();}
function dup(idx){const c=JSON.parse(JSON.stringify(widgets[idx]));c.id=++idC;widgets.splice(idx+1,0,c);render();sel(c.id);}
function clearCanvas(){widgets=[];selId=null;render();desel();}

function addSample(){
  clearCanvas();
  const add=type=>{const def=WIDGET_MAP[type];if(!def)return;const w=def.createData(++idC);widgets.push(w);return w;};
  const nd=add("namedate");
  const h=add("heading");h.text="Elmar der Elefant";
  const sh=add("subheading");sh.text="Aufgabe 1 – Lückentext";
  const ins=add("instruction");ins.text="Fülle die Lücken mit den passenden Wörtern aus.";
  const g=add("gap_text");g.text="Elmar ist ein ___. Er ist sehr ___. Alle Tiere sind seine ___.";g.mode="preview";
  const lb=add("linebox");lb.lines=2;lb.label="Meine Antwort:";
  const ws=add("wordsearch");ws.words="ELMAR,ELEFANT,BUNT,FREUND";
  add("divider");
  const sh2=add("subheading");sh2.text="Aufgabe 2 – Rechnen";
  const ar=add("arithmetic");ar.tasks="3 + 4 =\n10 - 6 =\n2 × 5 =\n8 ÷ 2 =";
  const nl=add("numberline");nl.start=0;nl.end=50;nl.step=10;nl.gaps="20,40";
  render();
}

// ── INIT ─────────────────────────────────────────────────────────
buildTabs();
buildList();
addSample();
</script>
