<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Blattwerk – Worksheet Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Fira+Sans:wght@400;500;700&display=swap');
@font-face {
  font-family: 'Grundschrift';
  src: url('fonts/Grundschrift-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'Grundschrift';
  src: url('fonts/Grundschrift-Bold.otf') format('opentype');
  font-weight: 700;
}
@font-face {
  font-family: 'DidactGothic7';
  src: url('fonts/Didact Gothic Regular 7mod.ttf') format('truetype');
  font-weight: 400;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0eee8;--sb:#1e1e2e;--sbt:#cdd6f4;--acc:#f38ba8;--acc2:#a6e3a1;--acc3:#89b4fa;--acc4:#fab387;--tb:#181825;}
body{font-family:'Nunito',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1e1e2e;}
/* Toolbar */
#toolbar{background:var(--tb);color:var(--sbt);display:flex;align-items:center;gap:10px;padding:9px 16px;flex-shrink:0;border-bottom:2px solid #313244;}
.logo{font-size:16px;font-weight:800;color:var(--acc);letter-spacing:-.5px;margin-right:8px;}.logo span{color:var(--acc3);}
.tbtn{background:#313244;border:none;color:var(--sbt);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s;}
.tbtn:hover{background:#45475a;}.tbtn.p{background:var(--acc);color:#1e1e2e;}.tbtn.p:hover{background:#eb6f92;}
.spacer{flex:1;}
/* Layout */
#layout{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
#sidebar{width:220px;background:var(--sb);color:var(--sbt);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;border-right:2px solid #313244;}
#sidebar::-webkit-scrollbar{width:4px;}#sidebar::-webkit-scrollbar-thumb{background:#45475a;border-radius:4px;}
.sb-search{padding:10px 12px 6px;position:sticky;top:0;background:var(--sb);z-index:2;}
.sb-search input{width:100%;background:#313244;border:none;border-radius:5px;padding:6px 9px;color:var(--sbt);font-family:inherit;font-size:12px;outline:none;}
.sb-search input::placeholder{color:#6c7086;}
/* Category tabs */
.cat-tabs{display:flex;gap:0;border-bottom:2px solid #313244;flex-shrink:0;}
.cat-tab{flex:1;background:transparent;border:none;color:#6c7086;padding:7px 4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:color .15s,background .15s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.cat-tab:hover{color:var(--sbt);background:#252535;}
.cat-tab.active{color:var(--sbt);border-bottom-color:var(--cat-color,#89b4fa);}
/* Widget buttons */
.wcat{padding:8px 10px 4px;}
.catlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#6c7086;margin-bottom:5px;}
.wbtn{display:flex;align-items:center;gap:7px;width:100%;background:#313244;border:none;border-radius:6px;color:var(--sbt);padding:6px 9px;margin-bottom:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;text-align:left;transition:background .12s,transform .1s;}
.wbtn:hover{background:#45475a;transform:translateX(2px);}
.wi{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.wd{font-size:10px;color:#6c7086;font-weight:400;display:block;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;}
/* Canvas */
#canvas-area{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;align-items:center;background:var(--bg);}
#canvas-area::-webkit-scrollbar{width:6px;}#canvas-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
.page{width:180mm;min-height:267mm;background:#fff;border-radius:4px;box-shadow:0 4px 22px rgba(0,0,0,.12);padding:12mm 14mm;border-top:5px solid #ccc;box-sizing:border-box;position:relative;cursor:default;}
.page.page-active{border-top-color:var(--acc3);}
.page-end{position:absolute;left:0;right:0;top:267mm;border-top:2px dashed rgba(255,0,170,.3);pointer-events:none;}
.page-end::after{content:"Ende Seite";position:absolute;right:8px;top:3px;font-size:9px;color:rgba(255,0,170,.5);font-family:sans-serif;letter-spacing:.5px;}
.page-hint{border:2.5px dashed #d0cec8;border-radius:9px;padding:28px;text-align:center;color:#bbb;font-size:14px;font-weight:600;margin-top:10px;}
.page-spacer{height:16px;flex-shrink:0;}
/* Widgets on canvas */
.wwrap{position:relative;margin-bottom:14px;border-radius:7px;outline:2px solid transparent;transition:outline-color .15s;}
.wwrap:hover{outline-color:var(--acc3);}.wwrap.sel{outline-color:var(--acc3);}
.wacts{display:none;position:absolute;top:-13px;right:3px;gap:3px;z-index:10;}
.wwrap:hover .wacts,.wwrap.sel .wacts{display:flex;}
.wa{background:var(--acc3);border:none;border-radius:3px;color:#1e1e2e;font-size:10px;font-weight:700;padding:2px 6px;cursor:pointer;font-family:inherit;}
.wa.del{background:var(--acc);}
.dh{display:none;position:absolute;left:-20px;top:50%;transform:translateY(-50%);cursor:grab;color:#bbb;font-size:15px;user-select:none;}
.wwrap:hover .dh{display:block;}
.winner{padding:7px 9px;}
/* widget internals */
.gmbtn{font-size:10px;background:#e8e6e0;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;color:#555;}
.ws-cell{width:24px;height:24px;background:none;border:1px solid #e0ddd6;border-radius:0;display:flex;align-items:center;justify-content:center;font-family:'Grundschrift',sans-serif;font-size:12px;font-weight:500;color:#333;}
/* Props panel */
#props{width:360px;background:#f7f5f0;border-left:2px solid #e0ddd6;padding:14px;overflow-y:auto;flex-shrink:0;font-size:12px;}
#props h3{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px;}
.prow{margin-bottom:9px;}
.prow label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:2px;}
.prow input,.prow select,.prow textarea{width:100%;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;outline:none;background:#fff;font-family:inherit;}
.prow input:focus,.prow select:focus,.prow textarea:focus{border-color:var(--acc3);}
/* misc */
*{user-select:none;}input,textarea{user-select:text;}
@page{size:A4 portrait;margin:15mm;}
.pg-num{display:none;position:absolute;bottom:8mm;right:14mm;font-size:10px;color:#333;}
#solution-pages{display:none;}
@media print{#solution-pages{display:block;}
.solution-header{page-break-before:always;display:flex;align-items:center;justify-content:center;height:40mm;font-size:18px;font-weight:700;color:#444;background:#fff;width:180mm;}
.solution-pages-inner .page{page-break-before:always;}}
@media print{
  #toolbar,#sidebar,#props,.wacts,.dh,.gmbtn{display:none!important;}
  #canvas-area{padding:0;background:#fff;display:block;}
  .page{box-shadow:none;border-top:none;border-radius:0;width:180mm;min-height:267mm;padding:12mm 14mm;page-break-after:auto;}
  .page ~ .page{page-break-before:always;}
  .page-end,.page-spacer{display:none;}
  body{background:#fff;height:auto;}
  .wwrap{outline:none!important;margin-bottom:12px;}
}
</style>
<style id="dyn-print-style"></style>
</head>
<body>
<div id="toolbar">
  <div class="logo">Blatt<span>werk</span></div>
  <button class="tbtn" onclick="document.getElementById('blatt-open').click()">📂 Öffnen</button>
  <button class="tbtn" onclick="blattSave()">💾 Speichern</button>
  <input id="blatt-name" type="text" value="Arbeitsblatt_1" placeholder="Dateiname"
    style="background:#f0eee8;border:none;border-radius:5px;color:#1e1e2e;
           padding:5px 8px;font-family:'DM Mono',monospace;font-size:12px;width:130px;outline:none;box-shadow:inset 0 3px 7px rgba(0,0,0,.45);"
    onfocus="this.select()">
  <input type="file" id="blatt-open" accept=".blatt" style="display:none" onchange="if(this.files[0])blattOpen(this.files[0]);this.value=''">
  <div style="width:1px;background:#313244;height:20px;margin:0 4px;"></div>
  <button class="tbtn" onclick="addSample()">📄 Beispiel</button>
  <button class="tbtn" onclick="clearCanvas()">🗑 Leeren</button>
  <button class="tbtn" onclick="addPage()">＋ Neue Seite</button>
  <button class="tbtn" id="undobtn" onclick="undo()" title="Rückgängig (Strg+Z)">↩ Rückgängig</button>
  <button class="tbtn" id="redobtn" onclick="redo()" title="Wiederholen (Strg+Shift+Z)">↪ Vorwärts</button>
  <div class="spacer"></div>
  <span id="wcount" style="color:#6c7086;font-size:11px;">0 Widgets</span>
  <div style="position:relative;display:inline-flex;">
    <button class="tbtn p" onclick="doPrint()" style="border-radius:5px 0 0 5px;">⬇ PDF / Drucken</button><button class="tbtn p" onclick="togglePrintPanel(event)" style="border-radius:0 5px 5px 0;border-left:1px solid rgba(255,255,255,.25);padding:5px 8px;">▾</button>
    <div id="print-panel" onclick="event.stopPropagation()" style="display:none;position:absolute;top:calc(100% + 6px);right:0;background:#1e1e2e;border:1.5px solid #313244;border-radius:8px;padding:14px 16px;z-index:200;width:230px;box-shadow:0 4px 20px rgba(0,0,0,.5);">
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#6c7086;margin-bottom:12px;">Druckoptionen</div>
      <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12px;color:#cdd6f4;margin-bottom:10px;">
        <input type="checkbox" id="opt-pagenums" onchange="printOpts.pageNumbers=this.checked;updatePrintStyle()">
        Seitenzahlen anzeigen
      </label>
      <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12px;color:#cdd6f4;margin-bottom:10px;">
        <input type="checkbox" id="opt-doublesided" onchange="printOpts.doubleSided=this.checked;updatePrintStyle()">
        Beidseitiger Druck
      </label>
      <div style="border-top:1px solid #313244;margin-top:10px;padding-top:10px;">
        <button onclick="doPrintSolutions()" style="width:100%;padding:6px;border:none;border-radius:5px;background:#313244;color:#cdd6f4;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">Lösung drucken</button>
      </div>
    </div>
  </div>
</div>
<div id="layout">
  <div id="sidebar">
    <div class="sb-search">
      <input type="text" id="search" placeholder="🔍 Widget suchen…" oninput="filterW(this.value)">
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="wlist"></div>
  </div>
  <div id="canvas-area"></div>
  <div id="solution-pages"></div>
  <div id="props">
    <h3>Eigenschaften</h3>
    <div id="pi" style="color:#bbb;text-align:center;margin-top:20px;font-size:12px;">Widget auswählen</div>
  </div>
</div>

<script>
// ── CATEGORIES ────────────────────────────────────────────────────
const CATEGORIES = {
  allgemein:  { label: "Allgemein",  color: "#89b4fa" },
  deutsch:    { label: "Deutsch",    color: "#f38ba8" },
  mathematik: { label: "Mathematik", color: "#a6e3a1" },
};

// ── Shared helpers (available to all widget scripts) ──────────────
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const pr  = (l,inp) => `<div class="prow"><label>${l}</label>${inp}</div>`;

// ── Widget registry (populated by widget scripts below) ───────────
const WIDGETS = [];
</script>

<!-- ── Widget scripts ──────────────────────────────────────────── -->
<script src="widgets/heading.js"></script>
<script src="widgets/subheading.js"></script>
<script src="widgets/instruction.js"></script>
<script src="widgets/namedate.js"></script>
<script src="widgets/divider.js"></script>
<script src="widgets/linebox.js"></script>
<script src="widgets/checkbox.js"></script>
<script src="widgets/image.js"></script>
<script src="widgets/table.js"></script>
<script src="widgets/gap_text.js"></script>
<script src="widgets/wordsearch.js"></script>
<script src="widgets/scramble.js"></script>
<script src="widgets/matching.js"></script>
<script src="widgets/numbering.js"></script>
<script src="widgets/arithmetic.js"></script>
<script src="widgets/numberline.js"></script>
<script src="widgets/geometry.js"></script>
<script src="widgets/zahlenmauer.js"></script>
<script src="widgets/zahlenhaus.js"></script>
<script src="widgets/uhr.js"></script>
<script src="widgets/kaestchen.js"></script>
<script src="widgets/schriftlich_addition.js"></script>
<script src="widgets/schriftlich_subtraktion.js"></script>
<script src="widgets/schriftlich_multiplikation.js"></script>
<script src="widgets/bildwort.js"></script>
<script src="widgets/stop.js"></script>
<script src="widgets/infobox.js"></script>
<script src="widgets/text.js"></script>
<script src="widgets/silbentext.js"></script>
<script src="widgets/silbenwort.js"></script>
<script src="widgets/crossword.js"></script>
<script src="widgets/multiplechoice.js"></script>
<script src="widgets/zahlenkette.js"></script>
<script src="widgets/stellenwert.js"></script>
<script src="widgets/geld.js"></script>
<script src="widgets/rechendreiecke.js"></script>

<script>
// ── Lookup map (built after all widgets are registered) ───────────
const WIDGET_MAP = Object.fromEntries(WIDGETS.map(w=>[w.meta.type,w]));

// ── STATE ─────────────────────────────────────────────────────────
let widgets=[],selId=null,idC=0,dragSrc=null,activeTab="allgemein",searchFilter="",activePage=0;
let _history=[],_future=[];
let _solutionsMode=false;
function saveHistory(){_history.push(JSON.stringify({widgets,selId}));if(_history.length>50)_history.shift();_future=[];}
function undo(){
  if(!_history.length)return;
  _future.push(JSON.stringify({widgets,selId}));
  const s=JSON.parse(_history.pop());
  widgets=s.widgets;selId=s.selId;
  render();if(selId)renderProps(selId);else desel();
}
function redo(){
  if(!_future.length)return;
  _history.push(JSON.stringify({widgets,selId}));
  const s=JSON.parse(_future.pop());
  widgets=s.widgets;selId=s.selId;
  render();if(selId)renderProps(selId);else desel();
}

function getPageRanges(){
  const ranges=[];let start=0;
  widgets.forEach((w,i)=>{if(w.type==='pagebreak'){ranges.push({start,end:i});start=i+1;}});
  ranges.push({start,end:widgets.length});
  return ranges;
}

// ── SIDEBAR ───────────────────────────────────────────────────────
function buildTabs(){
  const tabs=document.getElementById("cat-tabs");
  tabs.innerHTML="";
  Object.entries(CATEGORIES).forEach(([key,cat])=>{
    const btn=document.createElement("button");
    btn.className="cat-tab"+(activeTab===key?" active":"");
    btn.textContent=cat.label;
    btn.style.setProperty("--cat-color",cat.color);
    if(activeTab===key)btn.style.borderBottomColor=cat.color;
    btn.onclick=()=>{activeTab=key;buildTabs();buildList();};
    tabs.appendChild(btn);
  });
}

function buildList(){
  const list=document.getElementById("wlist");list.innerHTML="";
  const f=searchFilter.toLowerCase();
  const toShow=WIDGETS.filter(w=>{
    const matchCat=!f&&w.meta.category===activeTab;
    const matchSearch=f&&(w.meta.label.toLowerCase().includes(f)||w.meta.desc.toLowerCase().includes(f));
    return matchCat||matchSearch;
  });
  if(!toShow.length){list.innerHTML=`<div style="padding:16px 12px;color:#6c7086;font-size:12px;">Keine Widgets gefunden</div>`;return;}
  if(f){
    const grouped={};
    toShow.forEach(w=>{(grouped[w.meta.category]=grouped[w.meta.category]||[]).push(w);});
    Object.entries(grouped).forEach(([cat,items])=>{
      const sec=document.createElement("div");sec.className="wcat";
      sec.innerHTML=`<div class="catlabel" style="color:${CATEGORIES[cat].color};">${CATEGORIES[cat].label}</div>`;
      items.forEach(w=>sec.appendChild(makeBtn(w,CATEGORIES[w.meta.category].color)));
      list.appendChild(sec);
    });
  } else {
    const sec=document.createElement("div");sec.className="wcat";
    toShow.forEach(w=>sec.appendChild(makeBtn(w,CATEGORIES[w.meta.category].color)));
    list.appendChild(sec);
  }
}

function makeBtn(w,color){
  const btn=document.createElement("button");btn.className="wbtn";
  btn.innerHTML=`<span class="wi">${w.meta.icon}</span><span>${w.meta.label}<span class="wd">${w.meta.desc}</span></span><span class="dot" style="background:${color}"></span>`;
  btn.onclick=()=>addWidget(w.meta.type);
  return btn;
}

function filterW(val){searchFilter=val;buildList();}

// ── CANVAS ────────────────────────────────────────────────────────
function addWidget(type){
  const def=WIDGET_MAP[type];if(!def)return;
  saveHistory();
  const w=def.createData(++idC);
  // Insert after selected widget, otherwise at end of current page
  const selIdx=selId!=null?widgets.findIndex(x=>x.id===selId):-1;
  const insertAt=selIdx>=0?selIdx+1:(()=>{
    const ranges=getPageRanges();
    return (ranges[activePage]||ranges[ranges.length-1]).end;
  })();
  widgets.splice(insertAt,0,w);
  selId=w.id;render();renderProps(w.id);
}

function addPage(){
  saveHistory();
  const ranges=getPageRanges();
  const range=ranges[activePage]||ranges[ranges.length-1];
  widgets.splice(range.end,0,{id:++idC,type:'pagebreak'});
  activePage++;
  render();
}

function makeWrap(w, idx) {
  const def=WIDGET_MAP[w.type];if(!def)return null;
  const div=document.createElement("div");
  div.className="wwrap"+(selId===w.id?" sel":"");
  div.draggable=true;div.dataset.idx=idx;
  div.innerHTML=`
    <span class="dh" title="Ziehen zum Sortieren">⠿</span>
    <div class="wacts">
      <button class="wa" onclick="event.stopPropagation();mv(${idx},-1)" title="Nach oben">↑</button>
      <button class="wa" onclick="event.stopPropagation();mv(${idx},1)"  title="Nach unten">↓</button>
      <button class="wa" onclick="event.stopPropagation();dup(${idx})"   title="Duplizieren">⧉</button>
      <button class="wa del" onclick="event.stopPropagation();del(${w.id})" title="Löschen">✕</button>
    </div>
    <div class="winner" style="${{
      dashed: 'border:1.5px dashed #555;border-radius:6px;padding:8px;',
      thin:   'border:1px solid #333;border-radius:6px;padding:8px;',
      medium: 'border:2px solid #333;border-radius:6px;padding:8px;',
      thick:  'border:3px solid #333;border-radius:6px;padding:8px;',
    }[w.border]||''}">${def.render(w)}</div>`;
  div.onclick=e=>{e.stopPropagation();sel(w.id);};
  div.ondragstart=e=>{dragSrc=idx;e.dataTransfer.effectAllowed="move";};
  div.ondragover=e=>{
    e.preventDefault();
    const rightHalf=w.halfWidth && e.offsetX>div.offsetWidth/2;
    div.style.boxShadow=rightHalf?"3px 0 0 #89b4fa":"0 -3px 0 #89b4fa";
    div.dataset.dropSide=rightHalf?"right":"left";
  };
  div.ondragleave=()=>{div.style.boxShadow="";delete div.dataset.dropSide;};
  div.ondrop=e=>{
    e.preventDefault();div.style.boxShadow="";
    const t=+div.dataset.idx;
    const side=div.dataset.dropSide||"left";
    delete div.dataset.dropSide;
    if(dragSrc===null||dragSrc===t)return;
    saveHistory();
    const m=widgets.splice(dragSrc,1)[0];
    const adj=dragSrc<t?t-1:t;
    widgets.splice(side==="right"?adj+1:adj,0,m);
    render();
  };
  return div;
}

function renderPage(pageWidgets, pageIdx, range){
  const isActive=pageIdx===activePage;
  const pageDiv=document.createElement("div");
  pageDiv.className="page"+(isActive?" page-active":"");
  pageDiv.onclick=e=>{
    if(!e.target.closest(".wwrap")){
      if(activePage!==pageIdx){activePage=pageIdx;render();return;}
      desel();
    }
  };

  const wc=document.createElement("div");
  let i=0;
  while(i<pageWidgets.length){
    const w=pageWidgets[i],next=pageWidgets[i+1];
    const gIdx=range.start+i,gIdxNext=range.start+i+1;
    if(w.halfWidth&&next&&next.halfWidth){
      const row=document.createElement("div");row.style.cssText="display:flex;gap:10px;margin-bottom:14px;";
      const dA=makeWrap(w,gIdx),dB=makeWrap(next,gIdxNext);
      if(dA){dA.style.flex="1";dA.style.marginBottom="0";row.appendChild(dA);}
      if(dB){dB.style.flex="1";dB.style.marginBottom="0";row.appendChild(dB);}
      wc.appendChild(row);i+=2;
    } else if(w.halfWidth){
      const row=document.createElement("div");row.style.cssText="display:flex;gap:10px;margin-bottom:14px;";
      const div=makeWrap(w,gIdx);
      if(div){div.style.flex="1";div.style.marginBottom="0";row.appendChild(div);}
      const hIdx=gIdx;
      const dz=document.createElement("div");
      dz.style.cssText="flex:1;border:2px dashed #ddd;border-radius:8px;min-height:40px;transition:border-color .12s,box-shadow .12s;";
      dz.ondragover=e=>{e.preventDefault();dz.style.borderColor="#89b4fa";dz.style.boxShadow="inset 0 0 0 2px #89b4fa";};
      dz.ondragleave=()=>{dz.style.borderColor="#ddd";dz.style.boxShadow="";};
      dz.ondrop=e=>{
        e.preventDefault();dz.style.borderColor="#ddd";dz.style.boxShadow="";
        if(dragSrc===null||dragSrc===hIdx)return;
        const m=widgets.splice(dragSrc,1)[0];m.halfWidth=true;
        const adj=dragSrc<hIdx?hIdx-1:hIdx;widgets.splice(adj+1,0,m);render();
      };
      row.appendChild(dz);wc.appendChild(row);i++;
    } else {
      const div=makeWrap(w,gIdx);if(div)wc.appendChild(div);i++;
    }
  }
  pageDiv.appendChild(wc);
  const pgNumEl=document.createElement("div");pgNumEl.className="pg-num"+(pageIdx%2===1?" pg-left":"");pgNumEl.textContent=pageIdx+1;pageDiv.appendChild(pgNumEl);
  if(pageWidgets.length===0){
    const hint=document.createElement("div");hint.className="page-hint";
    hint.textContent="← Widget aus der Liste wählen und einfügen";
    pageDiv.appendChild(hint);
    // X-Button zum Löschen der leeren Seite (entfernt den zugehörigen Pagebreak)
    const delBtn=document.createElement("button");
    delBtn.textContent="✕";
    delBtn.title="Leere Seite löschen";
    delBtn.style.cssText="position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;border:none;background:#f38ba8;color:#fff;font-size:13px;font-weight:800;cursor:pointer;line-height:1;opacity:0.7;transition:opacity .15s;";
    delBtn.onmouseenter=()=>delBtn.style.opacity="1";
    delBtn.onmouseleave=()=>delBtn.style.opacity="0.7";
    delBtn.onclick=e=>{
      e.stopPropagation();
      saveHistory();
      // Pagebreak sitzt direkt vor range.start (außer bei der ersten Seite)
      const pbIdx=range.start-1;
      if(pbIdx>=0&&widgets[pbIdx]&&widgets[pbIdx].type==='pagebreak'){
        widgets.splice(pbIdx,1);
      }
      if(activePage>=getPageRanges().length)activePage=Math.max(0,activePage-1);
      render();
    };
    pageDiv.appendChild(delBtn);
  }
  const pe=document.createElement("div");pe.className="page-end";pageDiv.appendChild(pe);
  return pageDiv;
}

function render(){
  const ca=document.getElementById("canvas-area");
  ca.innerHTML="";
  const ranges=getPageRanges();
  const total=widgets.filter(w=>w.type!=='pagebreak').length;
  ranges.forEach((range,pageIdx)=>{
    const pw=widgets.slice(range.start,range.end);
    ca.appendChild(renderPage(pw,pageIdx,range));
    if(pageIdx<ranges.length-1){const sp=document.createElement("div");sp.className="page-spacer";ca.appendChild(sp);}
  });
  document.getElementById("wcount").textContent=`${total} Widget${total!==1?"s":""}`;
  requestAnimationFrame(()=>{
    document.querySelectorAll('textarea[data-autoresize]').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    document.querySelectorAll('svg.kaestchen-svg').forEach(svg=>{
      const cs=+svg.dataset.cs;
      const w=svg.parentElement.offsetWidth;
      svg.setAttribute('width',Math.floor(w/cs)*cs);
    });
    checkOverflow();
  });
}

function checkOverflow(){
  const ranges=getPageRanges();
  const pages=document.querySelectorAll('.page');

  // ── Underflow: auto-Break entfernen wenn erste Widget der Folgeseite reinpasst ──
  for(let pi=0;pi<pages.length-1;pi++){
    const pageEl=pages[pi];
    const range=ranges[pi];
    if(!range)continue;
    const breakIdx=range.end; // Index des Pagebreaks in widgets[]
    if(breakIdx>=widgets.length||widgets[breakIdx].type!=='pagebreak'||!widgets[breakIdx].auto)continue;
    const pxPerMm=pageEl.offsetWidth/180;
    const maxBottom=(267-12)*pxPerMm;
    const wraps=[...pageEl.querySelectorAll('.wwrap')];
    const pageBottom=wraps.length?wraps[wraps.length-1].offsetTop+wraps[wraps.length-1].offsetHeight:0;
    // Höhe des ersten Widgets der nächsten Seite messen
    const nextPage=pages[pi+1];
    const nextWraps=nextPage?[...nextPage.querySelectorAll('.wwrap')]:[];
    const firstNextH=nextWraps.length?nextWraps[0].offsetHeight+14:Infinity; // +14px Margin
    if(pageBottom+firstNextH<=maxBottom){
      // Sicher: auto-Break entfernen, Widget fließt zurück
      widgets.splice(breakIdx,1);
      if(activePage>=getPageRanges().length)activePage=Math.max(0,activePage-1);
      render();
      return;
    }
  }

  // ── Overflow: auto-Break einfügen wenn Inhalt zu lang ──
  for(let pi=0;pi<pages.length;pi++){
    const pageEl=pages[pi];
    const range=ranges[pi];
    if(!range)continue;
    const pxPerMm=pageEl.offsetWidth/180;
    const maxBottom=(267-12)*pxPerMm;
    const wraps=[...pageEl.querySelectorAll('.wwrap')];
    for(let i=0;i<wraps.length;i++){
      if(wraps[i].offsetTop+wraps[i].offsetHeight>maxBottom){
        if(i===0)break; // einzelnes Widget zu groß — kann nicht gesplittet werden
        widgets.splice(range.start+i,0,{id:++idC,type:'pagebreak',auto:true});
        render();
        return;
      }
    }
  }
}

function sel(id){selId=id;render();renderProps(id);}
function desel(){selId=null;render();document.getElementById("pi").innerHTML='<span style="color:#bbb;">Widget auswählen</span>';}

function renderProps(id){

  const p=document.getElementById("pi");

  const def=WIDGET_MAP[w.type];
  const hw=w.halfWidth||false;
  const halfToggle=`
    <div style="border-top:1px solid #e0ddd6;margin-top:12px;padding-top:10px;">
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:6px;">Layout</div>
      <div style="display:flex;gap:4px;">
        <button onclick="upd(${id},'halfWidth',false)"
          style="flex:1;padding:5px 4px;border-radius:4px;border:1.5px solid ${!hw?'#89b4fa':'#ddd'};
                 background:${!hw?'#e8f0ff':'#fff'};font-family:inherit;font-size:11px;font-weight:700;
                 cursor:pointer;color:${!hw?'#1e1e2e':'#999'};">⬛ Volle Breite</button>
        <button onclick="upd(${id},'halfWidth',true)"
          style="flex:1;padding:5px 4px;border-radius:4px;border:1.5px solid ${hw?'#89b4fa':'#ddd'};
                 background:${hw?'#e8f0ff':'#fff'};font-family:inherit;font-size:11px;font-weight:700;
                 cursor:pointer;color:${hw?'#1e1e2e':'#999'};">▬▬ Halbe Breite</button>
      </div>
      ${hw?'<div style="font-size:10px;color:#aaa;margin-top:4px;">Zwei aufeinanderfolgende halbe Widgets erscheinen nebeneinander.</div>':''}
    </div>`;
  const borderToggle = ['heading','subheading','divider'].includes(w.type) ? '' : `
    <div style="border-top:1px solid #e0ddd6;margin-top:12px;padding-top:10px;">
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:6px;">Rahmen</div>
      <select onchange="upd(${id},'border',this.value)"
        style="width:100%;border:1.5px solid #ddd;border-radius:4px;padding:4px 6px;font-family:inherit;font-size:12px;">
        <option value=""       ${!w.border||w.border===''      ?'selected':''}>Kein Rahmen</option>
        <option value="dashed" ${w.border==='dashed'           ?'selected':''}>- - - Gestrichelt</option>
        <option value="thin"   ${w.border==='thin'             ?'selected':''}>──── Leicht (1px)</option>
        <option value="medium" ${w.border==='medium'           ?'selected':''}>──── Mittel (2px)</option>
        <option value="thick"  ${w.border==='thick'            ?'selected':''}>──── Dick (3px)</option>
      </select>
    </div>`;
  p.innerHTML=`<div style="font-weight:800;font-size:13px;margin-bottom:11px;color:#333;">${def?def.meta.label:w.type}</div>${def?def.renderProps(w):""}${borderToggle}${halfToggle}`;
  enhanceNumberInputs(p);
}

function enhanceNumberInputs(container) {
  container.querySelectorAll('input[type="number"]:not([data-enhanced])').forEach(inp => {
    inp.dataset.enhanced = '1';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:4px;';
    const mkBtn = (label, delta) => {
      const b = document.createElement('button');
      b.textContent = label;
      b.style.cssText = 'width:30px;height:30px;flex-shrink:0;border:1.5px solid #45475a;border-radius:5px;background:#313244;color:#cdd6f4;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;';
      b.onmousedown = e => e.preventDefault();
      b.onclick = () => {
        const min = inp.min !== '' ? +inp.min : -Infinity;
        const max = inp.max !== '' ? +inp.max :  Infinity;
        inp.value = Math.min(max, Math.max(min, (+inp.value || 0) + delta));
        inp.dispatchEvent(new Event('change', { bubbles: true }));
      };
      return b;
    };
    inp.parentNode.insertBefore(wrap, inp);
    inp.style.cssText = 'flex:1;min-width:0;text-align:center;border:1.5px solid #ddd;border-radius:4px;padding:4px 2px;font-size:13px;font-family:inherit;outline:none;background:#fff;';
    wrap.appendChild(mkBtn('−', -1));
    wrap.appendChild(inp);
    wrap.appendChild(mkBtn('+', +1));
  });
}

function upd(id,k,v){saveHistory();const w=widgets.find(x=>x.id===id);if(w){w[k]=v;render();renderProps(id);}}
function updrg(id,k,v){const w=widgets.find(x=>x.id===id);if(w){w[k]=v;render();renderProps(id);}}

// ── ZAHLENMAUER helpers ───────────────────────────────────────────
function zmEnsureMauern(w) {
  const n = w.rows_count || 4, fm = w.fillMode || "basis", anz = w.anzahl || 1, zr = w.zahlenraum || 10;
  if (!w.mauern) w.mauern = [{ base: w.base || [], shown: w.shown }];
  while (w.mauern.length < anz) w.mauern.push(zmMakeMauer(n, fm, zr));
  w.mauern = w.mauern.slice(0, anz);
}
function zmSetBase(id, col, val) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  zmEnsureMauern(w);
  const base = (w.mauern[0].base || []).slice();
  base[col] = val !== "" ? +val : 1;
  w.mauern[0].base = base;
  render(); renderProps(id);
}
function zmResize(id, n) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  n = Math.max(2, Math.min(6, n));
  w.rows_count = n;
  zmEnsureMauern(w);
  w.mauern = w.mauern.map(m => ({
    base: Array.from({length:n}, (_,c) => (m.base||[])[c] ?? Math.floor(Math.random()*8)+1),
    shown: zmGenShown(n, w.fillMode || "basis")
  }));
  render(); renderProps(id);
}
function zmFillMode(id, mode) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  w.fillMode = mode;
  zmEnsureMauern(w);
  w.mauern = w.mauern.map(m => ({ ...m, shown: zmGenShown(w.rows_count||4, mode) }));
  render(); renderProps(id);
}
function zmRandomBase(id) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  const n = w.rows_count || 4, fm = w.fillMode || "basis", zr = w.zahlenraum || 10;
  zmEnsureMauern(w);
  w.mauern = w.mauern.map(() => zmMakeMauer(n, fm, zr));
  render(); renderProps(id);
}
function zmSetZahlenraum(id, zr) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  w.zahlenraum = zr;
  const n = w.rows_count || 4, fm = w.fillMode || "basis";
  zmEnsureMauern(w);
  w.mauern = w.mauern.map(() => zmMakeMauer(n, fm, zr));
  render(); renderProps(id);
}
function zmSetAnzahl(id, anzahl) {
  const w = widgets.find(x=>x.id===id); if(!w) return;
  saveHistory();
  w.anzahl = Math.max(1, Math.min(6, anzahl));
  zmEnsureMauern(w);
  render(); renderProps(id);
}
function tgap(id){saveHistory();const w=widgets.find(x=>x.id===id);if(w){w.mode=w.mode==="edit"?"preview":"edit";render();}}
function del(id){saveHistory();widgets=widgets.filter(x=>x.id!==id);if(selId===id)desel();else render();}
function mv(idx,d){
  const ni=idx+d;if(ni<0||ni>=widgets.length)return;
  if(widgets[ni]&&widgets[ni].type==='pagebreak')return;
  saveHistory();[widgets[idx],widgets[ni]]=[widgets[ni],widgets[idx]];render();
}
function dup(idx){saveHistory();const c=JSON.parse(JSON.stringify(widgets[idx]));c.id=++idC;widgets.splice(idx+1,0,c);render();sel(c.id);}
function clearCanvas(){saveHistory();widgets=[];selId=null;activePage=0;render();desel();}

// ── SAVE / LOAD (.blatt) ─────────────────────────────────────────
let _blattFilename = 'dokument.blatt';

async function blattSave() {
  if (!window.JSZip) { alert('JSZip wird geladen…'); return; }
  const nameEl = document.getElementById('blatt-name');
  const base = (nameEl?.value.trim() || 'dokument').replace(/\.blatt$/i, '');
  _blattFilename = base + '.blatt';
  const zip = new JSZip();
  const imgFolder = zip.folder('images');

  // Deep-clone so we don't mutate live data
  const wcopy = JSON.parse(JSON.stringify(widgets));

  for (const w of wcopy) {
    if (w.src && w.src.startsWith('data:')) {
      const m = w.src.match(/^data:([^;]+);base64,(.+)$/);
      if (m) {
        const ext = m[1].split('/')[1].replace('jpeg','jpg') || 'png';
        const fname = `img-${w.id}.${ext}`;
        imgFolder.file(fname, m[2], { base64: true });
        w.src = `images/${fname}`;
      }
    }
  }

  zip.file('document.json', JSON.stringify({ version:1, idC, widgets:wcopy }, null, 2));
  const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = _blattFilename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function blattOpen(file) {
  if (!window.JSZip) { alert('JSZip wird geladen…'); return; }
  _blattFilename = file.name;
  const nameEl = document.getElementById('blatt-name');
  if (nameEl) nameEl.value = file.name.replace(/\.blatt$/i, '');
  const zip = await JSZip.loadAsync(file);
  const docJson = await zip.file('document.json').async('string');
  const doc = JSON.parse(docJson);
  const loaded = doc.widgets || [];

  const mimeMap = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
                    gif:'image/gif', webp:'image/webp', svg:'image/svg+xml' };
  for (const w of loaded) {
    if (w.src && w.src.startsWith('images/')) {
      const entry = zip.file(w.src);
      if (entry) {
        const b64 = await entry.async('base64');
        const ext = w.src.split('.').pop().toLowerCase();
        w.src = `data:${mimeMap[ext]||'image/png'};base64,${b64}`;
      }
    }
  }

  saveHistory();
  widgets = loaded;
  idC = doc.idC || Math.max(0, ...loaded.map(w => w.id), 0);
  selId = null; activePage = 0;
  render(); desel();
}

// ── PRINT OPTIONS ────────────────────────────────────────────────
let printOpts = { pageNumbers: false, doubleSided: false };

function updatePrintStyle() {
  const ds = printOpts.doubleSided;
  let css = ds
    ? `@page :right{margin:5mm 0 0 10mm;}@page :left{margin:5mm 10mm 0 0;}`
    : `@page{margin:5mm 0 0 10mm;}`;
  if (printOpts.pageNumbers) {
    css += `.pg-num{display:block!important;}`;
    if (ds) css += `.pg-num.pg-left{right:auto;left:14mm;}`;
  } else {
    css += `.pg-num{display:none!important;}`;
  }
  document.getElementById('dyn-print-style').textContent = css;
}

function doPrint() {
  document.getElementById('print-panel').style.display = 'none';
  const prevSel = selId; selId = null; render();
  updatePrintStyle();
  window.print();
  selId = prevSel; render();
}

function doPrintSolutions() {
  document.getElementById('print-panel').style.display = 'none';
  const sc = document.getElementById('solution-pages');
  sc.innerHTML = '';
  _solutionsMode = true;
  getPageRanges().forEach((range, pageIdx) => {
    const pw = widgets.slice(range.start, range.end);
    const pageDiv = renderPage(pw, pageIdx, range);
    pageDiv.classList.remove('page-active');
    pageDiv.querySelectorAll('.wacts,.dh,.page-end').forEach(el => el.remove());
    sc.appendChild(pageDiv);
  });
  _solutionsMode = false;
  updatePrintStyle();
  window.print();
  sc.innerHTML = '';
}

function togglePrintPanel(e) {
  e.stopPropagation();
  const p = document.getElementById('print-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', () => {
  const p = document.getElementById('print-panel');
  if (p) p.style.display = 'none';
});

document.addEventListener('keydown', e => {

  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))){e.preventDefault();redo();}
});
