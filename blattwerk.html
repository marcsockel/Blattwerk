<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Blattwerk – Worksheet Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0eee8;--sb:#1e1e2e;--sbt:#cdd6f4;--acc:#f38ba8;--acc2:#a6e3a1;--acc3:#89b4fa;--acc4:#fab387;--tb:#181825;}
body{font-family:'Nunito',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1e1e2e;}
#toolbar{background:var(--tb);color:var(--sbt);display:flex;align-items:center;gap:10px;padding:9px 16px;flex-shrink:0;border-bottom:2px solid #313244;}
.logo{font-size:16px;font-weight:800;color:var(--acc);letter-spacing:-.5px;margin-right:8px;}.logo span{color:var(--acc3);}
.tbtn{background:#313244;border:none;color:var(--sbt);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s;}
.tbtn:hover{background:#45475a;}.tbtn.p{background:var(--acc);color:#1e1e2e;}.tbtn.p:hover{background:#eb6f92;}
.spacer{flex:1;}
#layout{display:flex;flex:1;overflow:hidden;}
#sidebar{width:215px;background:var(--sb);color:var(--sbt);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;border-right:2px solid #313244;}
#sidebar::-webkit-scrollbar{width:4px;}#sidebar::-webkit-scrollbar-thumb{background:#45475a;border-radius:4px;}
.sb-search{padding:10px 12px 6px;position:sticky;top:0;background:var(--sb);z-index:2;}
.sb-search input{width:100%;background:#313244;border:none;border-radius:5px;padding:6px 9px;color:var(--sbt);font-family:inherit;font-size:12px;outline:none;}
.sb-search input::placeholder{color:#6c7086;}
.wcat{padding:9px 11px 4px;}
.catlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#6c7086;margin-bottom:5px;}
.wbtn{display:flex;align-items:center;gap:7px;width:100%;background:#313244;border:none;border-radius:6px;color:var(--sbt);padding:6px 9px;margin-bottom:3px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;text-align:left;transition:background .12s,transform .1s;}
.wbtn:hover{background:#45475a;transform:translateX(2px);}
.wi{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.wd{font-size:10px;color:#6c7086;font-weight:400;display:block;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;}
#canvas-area{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;align-items:center;background:var(--bg);}
#canvas-area::-webkit-scrollbar{width:6px;}#canvas-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
#page{width:630px;min-height:800px;background:#fff;border-radius:4px;box-shadow:0 4px 22px rgba(0,0,0,.12);padding:38px 46px;border-top:5px solid var(--acc3);}
#hint{border:2.5px dashed #d0cec8;border-radius:9px;padding:28px;text-align:center;color:#bbb;font-size:14px;font-weight:600;margin-top:10px;}
.wwrap{position:relative;margin-bottom:15px;border-radius:7px;border:2px solid transparent;transition:border-color .15s;}
.wwrap:hover{border-color:var(--acc3);}.wwrap.sel{border-color:var(--acc3);}
.wacts{display:none;position:absolute;top:-13px;right:3px;gap:3px;z-index:10;}
.wwrap:hover .wacts,.wwrap.sel .wacts{display:flex;}
.wa{background:var(--acc3);border:none;border-radius:3px;color:#1e1e2e;font-size:10px;font-weight:700;padding:2px 6px;cursor:pointer;font-family:inherit;}
.wa.del{background:var(--acc);}
.dh{display:none;position:absolute;left:-20px;top:50%;transform:translateY(-50%);cursor:grab;color:#bbb;font-size:15px;user-select:none;}
.wwrap:hover .dh{display:block;}
.winner{padding:7px 9px;}
/* widget styles */
.w-h input{border:none;outline:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;width:100%;background:transparent;}
.w-sh input{border:none;outline:none;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;width:100%;color:#555;background:transparent;}
.w-ins{background:#f8f6f2;border-left:4px solid var(--acc4);padding:7px 11px;border-radius:0 5px 5px 0;}
.w-ins textarea{border:none;outline:none;font-family:'Nunito',sans-serif;font-size:13px;width:100%;background:transparent;resize:none;min-height:34px;color:#555;}
.gap-blank{display:inline-block;border-bottom:2px solid #333;min-width:55px;margin:0 2px;}
.gmbtn{font-size:10px;background:#e8e6e0;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;color:#555;}
.nd{display:flex;gap:16px;font-size:13px;}
.ndf{display:flex;align-items:flex-end;gap:5px;flex:1;}
.ndl{flex:1;border-bottom:1.5px solid #999;height:20px;}
.ws-cell{width:21px;height:21px;background:#f5f3ef;border:1px solid #e0ddd6;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:#333;}
/* props */
#props{width:195px;background:#f7f5f0;border-left:2px solid #e0ddd6;padding:14px;overflow-y:auto;flex-shrink:0;font-size:12px;}
#props h3{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:10px;}
.prow{margin-bottom:9px;}
.prow label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:2px;}
.prow input,.prow select{width:100%;border:1.5px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;outline:none;background:#fff;font-family:inherit;}
.prow input:focus{border-color:var(--acc3);}
*{user-select:none;}input,textarea{user-select:text;}
@media print{#toolbar,#sidebar,#props,.wacts,.dh,.gmbtn{display:none!important;}#canvas-area{padding:0;background:#fff;}#page{box-shadow:none;border-top:none;width:100%;}body{background:#fff;}.wwrap{border:none!important;}}
</style>
</head>
<body>
<div id="toolbar">
  <div class="logo">Blatt<span>werk</span></div>
  <button class="tbtn" onclick="addSample()">📄 Beispiel</button>
  <button class="tbtn" onclick="clearCanvas()">🗑 Leeren</button>
  <div class="spacer"></div>
  <span id="wcount" style="color:#6c7086;font-size:11px;">0 Widgets</span>
  <button class="tbtn p" onclick="window.print()">⬇ PDF / Drucken</button>
</div>
<div id="layout">
  <div id="sidebar">
    <div class="sb-search"><input type="text" id="search" placeholder="🔍 Widget suchen…" oninput="filterW(this.value)"></div>
    <div id="wlist"></div>
  </div>
  <div id="canvas-area" onclick="desel()">
    <div id="page">
      <div id="wc"></div>
      <div id="hint">← Widget aus der Liste wählen und einfügen</div>
    </div>
  </div>
  <div id="props">
    <h3>Eigenschaften</h3>
    <div id="pi" style="color:#bbb;text-align:center;margin-top:20px;font-size:12px;">Widget auswählen</div>
  </div>
</div>
<script>
const REG=[
  {cat:"Struktur",col:"#89b4fa",items:[
    {type:"heading",icon:"H1",label:"Überschrift",desc:"Großer Titel"},
    {type:"subheading",icon:"H2",label:"Zwischentitel",desc:"Abschnittstitel"},
    {type:"instruction",icon:"📋",label:"Aufgabentext",desc:"Aufgabenstellung"},
    {type:"namedate",icon:"✏️",label:"Name / Datum",desc:"Kopfzeile"},
    {type:"divider",icon:"—",label:"Trennlinie",desc:"Abschnitt trennen"},
  ]},
  {cat:"Aufgaben",col:"#f38ba8",items:[
    {type:"gap_text",icon:"___",label:"Lückentext",desc:"___ zum Ausfüllen"},
    {type:"linebox",icon:"≡",label:"Schreiblinien",desc:"Antwortzeilen"},
    {type:"checkbox",icon:"☑",label:"Checkliste",desc:"Ankreuzaufgabe"},
    {type:"matching",icon:"↔",label:"Zuordnung",desc:"Paare verbinden"},
    {type:"numbering",icon:"1.",label:"Nummerierung",desc:"Geordnete Liste"},
  ]},
  {cat:"Spiele & Rätsel",col:"#a6e3a1",items:[
    {type:"wordsearch",icon:"🔠",label:"Suchsel",desc:"Buchstabengitter"},
    {type:"scramble",icon:"🔀",label:"Buchstabensalat",desc:"Wörter entwirren"},
    {type:"crossword",icon:"⊞",label:"Kreuzworträtsel",desc:"Coming soon"},
  ]},
  {cat:"Medien",col:"#fab387",items:[
    {type:"image",icon:"🖼",label:"Bild",desc:"Bildplatzhalter"},
    {type:"table",icon:"⊞",label:"Tabelle",desc:"Zeilen & Spalten"},
  ]},
];
let widgets=[],selId=null,idC=0,dragSrc=null;

function buildSidebar(f=""){
  const list=document.getElementById("wlist");list.innerHTML="";
  REG.forEach(cat=>{
    const items=cat.items.filter(i=>!f||i.label.toLowerCase().includes(f.toLowerCase())||i.desc.toLowerCase().includes(f.toLowerCase()));
    if(!items.length)return;
    const sec=document.createElement("div");sec.className="wcat";
    sec.innerHTML=`<div class="catlabel">${cat.cat}</div>`;
    items.forEach(w=>{
      const btn=document.createElement("button");btn.className="wbtn";
      btn.innerHTML=`<span class="wi">${w.icon}</span><span>${w.label}<span class="wd">${w.desc}</span></span><span class="dot" style="background:${cat.col}"></span>`;
      btn.onclick=()=>addWidget(w.type);sec.appendChild(btn);
    });
    list.appendChild(sec);
  });
}
function filterW(v){buildSidebar(v);}

function mk(type){
  const id=++idC;
  const m={heading:{id,type,text:"Überschrift"},subheading:{id,type,text:"Aufgabe 1"},
    instruction:{id,type,text:"Lies den Text und beantworte die Fragen."},
    namedate:{id,type},divider:{id,type},
    gap_text:{id,type,text:"Der Elefant heißt ___. Er ist ___ und ___.",mode:"edit"},
    linebox:{id,type,lines:3,label:""},
    checkbox:{id,type,items:["Richtig","Falsch","Vielleicht"]},
    matching:{id,type,pairs:[["Hund","bellt"],["Katze","miaut"],["Kuh","muht"]]},
    numbering:{id,type,items:["Erstens","Zweitens","Drittens"]},
    wordsearch:{id,type,words:"ELMAR,ELEFANT,BUNT"},
    scramble:{id,type,words:"SCHULE,KLASSE,LEHRER"},
    crossword:{id,type},image:{id,type,caption:"Bild"},table:{id,type,rows:3,cols:3}};
  return m[type]||{id,type};
}
function addWidget(type){const w=mk(type);widgets.push(w);render();sel(w.id);}

function ri(w){
  const e=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  switch(w.type){
    case"heading":return`<div class="w-h"><input value="${e(w.text)}" onclick="event.stopPropagation()" onchange="upd(${w.id},'text',this.value)"></div>`;
    case"subheading":return`<div class="w-sh"><input value="${e(w.text)}" onclick="event.stopPropagation()" onchange="upd(${w.id},'text',this.value)"></div>`;
    case"instruction":return`<div class="w-ins"><textarea onclick="event.stopPropagation()" onchange="upd(${w.id},'text',this.value)">${e(w.text)}</textarea></div>`;
    case"namedate":return`<div class="nd"><div class="ndf"><strong>Name:</strong><div class="ndl"></div></div><div class="ndf"><strong>Datum:</strong><div class="ndl"></div></div></div>`;
    case"divider":return`<hr style="border:none;border-top:2px solid #e0ddd6;margin:6px 0;">`;
    case"gap_text":
      if(w.mode==="edit")return`<textarea style="border:1px solid #ddd;border-radius:5px;padding:6px;font-size:14px;width:100%;resize:none;min-height:58px;font-family:inherit;" onclick="event.stopPropagation()" onchange="upd(${w.id},'text',this.value)">${e(w.text)}</textarea><button class="gmbtn" onclick="event.stopPropagation();tgap(${w.id})">👁 Vorschau</button>`;
      return`<div style="font-size:14px;line-height:2.1;">${w.text.replace(/___/g,'<span class="gap-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>')}</div><button class="gmbtn" onclick="event.stopPropagation();tgap(${w.id})">✏️ Bearbeiten</button>`;
    case"linebox":
      return Array.from({length:w.lines},(_,i)=>`${(w.label&&i===0)?`<div style="font-size:11px;color:#888;font-weight:700;margin-bottom:-2px;">${w.label}</div>`:""}<div style="border-bottom:1.5px solid #999;height:24px;margin-bottom:6px;"></div>`).join("");
    case"checkbox":
      return w.items.map(it=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:14px;"><div style="width:15px;height:15px;border:2px solid #999;border-radius:2px;flex-shrink:0;"></div>${it}</div>`).join("");
    case"matching":
      return`<table style="border-collapse:collapse;">${w.pairs.map(([a,b])=>`<tr><td style="padding:3px 8px;font-size:13px;">${a}</td><td style="padding:3px 10px;color:#bbb;letter-spacing:2px;">·····</td><td style="padding:3px 8px;font-size:13px;">${b}</td></tr>`).join("")}</table>`;
    case"numbering":
      return w.items.map((it,i)=>`<div style="font-size:14px;padding:2px 0;"><strong>${i+1}.</strong> ${it}</div>`).join("");
    case"wordsearch":return makeWS(w);
    case"scramble":{
      const words=w.words.split(",").map(wd=>{const a=wd.trim().toUpperCase().split("").sort(()=>Math.random()-.5).join("");return`<span style="font-family:monospace;font-size:14px;background:#f0eee8;padding:2px 7px;border-radius:3px;margin:2px;">${a}</span>`;}).join(" &rarr; __ &nbsp;");
      return`<div style="line-height:2;">${words}</div>`;
    }
    case"crossword":return`<div style="border:2px dashed #ddd;border-radius:7px;padding:20px;text-align:center;color:#aaa;font-size:13px;">⊞ Kreuzworträtsel – demnächst verfügbar</div>`;
    case"image":return`<div style="border:2.5px dashed #ccc;border-radius:7px;padding:28px;text-align:center;color:#aaa;font-size:13px;font-weight:600;background:#fafaf8;">🖼<br>${e(w.caption)}</div>`;
    case"table":{
      let rows="";for(let r=0;r<w.rows;r++){let cells="";for(let c=0;c<w.cols;c++)cells+=`<td style="border:1px solid #ddd;padding:7px 10px;min-width:55px;font-size:13px;">&nbsp;</td>`;rows+=`<tr>${cells}</tr>`;}
      return`<table style="border-collapse:collapse;width:100%;">${rows}</table>`;
    }
    default:return`<div style="color:#aaa;">${w.type}</div>`;
  }
}

function makeWS(w){
  const words=w.words.split(",").map(x=>x.trim().toUpperCase()).filter(Boolean);
  const S=9;let grid=Array.from({length:S},()=>Array(S).fill(""));
  const dirs=[[0,1],[1,0],[1,1]];
  words.forEach(word=>{
    for(let a=0;a<80;a++){
      const[dr,dc]=dirs[Math.floor(Math.random()*dirs.length)];
      const r=Math.floor(Math.random()*(S-(dr?word.length:0)));
      const c=Math.floor(Math.random()*(S-(dc?word.length:0)));
      let ok=true;for(let i=0;i<word.length;i++){const ch=grid[r+dr*i][c+dc*i];if(ch&&ch!==word[i]){ok=false;break;}}
      if(ok){for(let i=0;i<word.length;i++)grid[r+dr*i][c+dc*i]=word[i];break;}
    }
  });
  const L="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(!grid[r][c])grid[r][c]=L[Math.floor(Math.random()*26)];
  const cells=grid.map(row=>row.map(ch=>`<div class="ws-cell">${ch}</div>`).join("")).join("");
  const wl=words.map(wd=>`<span style="font-family:monospace;font-size:12px;background:#f0eee8;padding:2px 6px;border-radius:3px;margin:2px;display:inline-block;">${wd}</span>`).join("");
  return`<div><div style="font-size:11px;color:#888;font-weight:700;margin-bottom:5px;">Finde die Wörter:</div><div style="margin-bottom:7px;">${wl}</div><div style="display:inline-grid;grid-template-columns:repeat(${S},21px);gap:2px;">${cells}</div></div>`;
}

function render(){
  const c=document.getElementById("wc");
  document.getElementById("hint").style.display=widgets.length?"none":"block";
  c.innerHTML="";
  widgets.forEach((w,idx)=>{
    const div=document.createElement("div");
    div.className="wwrap"+(selId===w.id?" sel":"");
    div.draggable=true;div.dataset.idx=idx;
    div.innerHTML=`
      <span class="dh">⠿</span>
      <div class="wacts">
        <button class="wa" onclick="event.stopPropagation();mv(${idx},-1)">↑</button>
        <button class="wa" onclick="event.stopPropagation();mv(${idx},1)">↓</button>
        <button class="wa" onclick="event.stopPropagation();dup(${idx})">⧉</button>
        <button class="wa del" onclick="event.stopPropagation();del(${w.id})">✕</button>
      </div>
      <div class="winner">${ri(w)}</div>`;
    div.onclick=e=>{e.stopPropagation();sel(w.id);};
    div.ondragstart=e=>{dragSrc=idx;e.dataTransfer.effectAllowed="move";};
    div.ondragover=e=>{e.preventDefault();div.style.boxShadow="0 -2px 0 #89b4fa";};
    div.ondragleave=()=>{div.style.boxShadow="";};
    div.ondrop=e=>{e.preventDefault();div.style.boxShadow="";const t=+div.dataset.idx;if(dragSrc===null||dragSrc===t)return;const m=widgets.splice(dragSrc,1)[0];widgets.splice(t,0,m);render();};
    c.appendChild(div);
  });
  document.getElementById("wcount").textContent=`${widgets.length} Widget${widgets.length!==1?"s":""}`;
}

function sel(id){selId=id;render();renderProps(id);}
function desel(){selId=null;render();document.getElementById("pi").innerHTML='<span style="color:#bbb;">Widget auswählen</span>';}

function renderProps(id){
  const w=widgets.find(x=>x.id===id);
  const p=document.getElementById("pi");
  if(!w){p.innerHTML='<span style="color:#bbb;">Widget auswählen</span>';return;}
  const e=s=>String(s||"").replace(/"/g,"&quot;");
  const getLabel=t=>{for(const c of REG)for(const i of c.items)if(i.type===t)return i.label;return t;};
  let h=`<div style="font-weight:800;font-size:13px;margin-bottom:11px;color:#333;">${getLabel(w.type)}</div>`;
  const pr=(l,inp)=>`<div class="prow"><label>${l}</label>${inp}</div>`;
  switch(w.type){
    case"heading":case"subheading":case"instruction":
      h+=pr("Text",`<input value="${e(w.text)}" onchange="upd(${id},'text',this.value)">`);break;
    case"gap_text":
      h+=pr("Text (___=Lücke)",`<input value="${e(w.text)}" onchange="upd(${id},'text',this.value)">`);break;
    case"linebox":
      h+=pr("Zeilen",`<input type="number" min="1" max="10" value="${w.lines}" onchange="upd(${id},'lines',+this.value)">`);
      h+=pr("Beschriftung",`<input value="${e(w.label)}" placeholder="z.B. Antwort:" onchange="upd(${id},'label',this.value)">`);break;
    case"wordsearch":
      h+=pr("Wörter (Komma)",`<input value="${e(w.words)}" onchange="updrg(${id},'words',this.value)">`);break;
    case"scramble":
      h+=pr("Wörter (Komma)",`<input value="${e(w.words)}" onchange="upd(${id},'words',this.value)">`);break;
    case"table":
      h+=pr("Zeilen",`<input type="number" min="1" max="10" value="${w.rows}" onchange="upd(${id},'rows',+this.value)">`);
      h+=pr("Spalten",`<input type="number" min="1" max="8" value="${w.cols}" onchange="upd(${id},'cols',+this.value)">`);break;
    case"image":
      h+=pr("Beschriftung",`<input value="${e(w.caption)}" onchange="upd(${id},'caption',this.value)">`);break;
    default:h+='<span style="color:#bbb;font-size:11px;">Keine Optionen</span>';
  }
  p.innerHTML=h;
}

function upd(id,k,v){const w=widgets.find(x=>x.id===id);if(w)w[k]=v;render();}
function updrg(id,k,v){const w=widgets.find(x=>x.id===id);if(w)w[k]=v;render();}
function tgap(id){const w=widgets.find(x=>x.id===id);if(w)w.mode=w.mode==="edit"?"preview":"edit";render();}
function del(id){widgets=widgets.filter(x=>x.id!==id);if(selId===id)desel();else render();}
function mv(idx,d){const ni=idx+d;if(ni<0||ni>=widgets.length)return;[widgets[idx],widgets[ni]]=[widgets[ni],widgets[idx]];render();}
function dup(idx){const c=JSON.parse(JSON.stringify(widgets[idx]));c.id=++idC;widgets.splice(idx+1,0,c);render();sel(c.id);}
function clearCanvas(){widgets=[];selId=null;render();desel();}

function addSample(){
  clearCanvas();
  ["namedate","heading","instruction","gap_text","linebox","wordsearch"].forEach(addWidget);
  widgets.find(w=>w.type==="heading").text="Elmar der Elefant";
  widgets.find(w=>w.type==="instruction").text="Fülle die Lücken mit den passenden Wörtern aus.";
  const g=widgets.find(w=>w.type==="gap_text");
  g.text="Elmar ist ein ___. Er ist sehr ___. Alle Tiere sind seine ___.";g.mode="preview";
  widgets.find(w=>w.type==="wordsearch").words="ELMAR,ELEFANT,BUNT,FREUND";
  render();
}

buildSidebar();
addSample();
</script>
</body>
</html>
